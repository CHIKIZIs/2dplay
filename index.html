<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мини-Выживание 5.0: Глобальное Обновление</title>
    <link href="https://fonts.googleapis.com/css2?family=Jura:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #121212;
            --panel-bg: rgba(20, 20, 25, 0.95);
            --neon-blue: #00d2d3;
            --neon-orange: #ff9f43;
            --text-main: #ecf0f1;
            --border-color: #333;
        }

        body { 
            margin: 0; overflow: hidden; background-color: var(--bg-dark); 
            font-family: 'Jura', sans-serif; color: var(--text-main); user-select: none; 
        }
        canvas { display: block; }
        
        /* СТАРТОВЫЙ ЭКРАН */
        #start-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #2c3e50 0%, #000000 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000;
        }
        .customizer-box {
            background: var(--panel-bg); padding: 30px; border-radius: 15px;
            border: 2px solid var(--neon-blue); box-shadow: 0 0 20px rgba(0, 210, 211, 0.3);
            text-align: center; width: 350px;
        }
        .customizer-box h1 { color: var(--neon-orange); margin-top: 0; text-transform: uppercase; text-shadow: 0 0 10px rgba(255, 159, 67, 0.5); }
        .setting-row { display: flex; justify-content: space-between; align-items: center; margin: 15px 0; }
        .start-btn {
            background: var(--neon-orange); color: #000; border: none; padding: 15px 30px;
            font-size: 18px; font-weight: bold; border-radius: 8px; cursor: pointer;
            margin-top: 20px; width: 100%; transition: 0.2s; font-family: 'Jura', sans-serif;
        }
        .start-btn:hover { background: #ffa502; box-shadow: 0 0 15px var(--neon-orange); }

        /* ИНТЕРФЕЙС ИГРЫ */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; }
        
        /* МИНИ КАРТА */
        #minimap-container {
            position: absolute; top: 20px; right: 20px; width: 150px; height: 150px;
            border: 2px solid var(--neon-blue); border-radius: 50%; overflow: hidden;
            background: rgba(0,0,0,0.8); box-shadow: 0 0 15px rgba(0, 210, 211, 0.4);
            pointer-events: auto;
        }

        /* ПОЛОСКИ СТАТУСА */
        #status-bars { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; }
        .bar-wrapper { width: 180px; height: 30px; background: rgba(0, 0, 0, 0.8); border: 2px solid var(--border-color); border-radius: 15px; overflow: hidden; position: relative; }
        .bar { height: 100%; width: 100%; transition: width 0.3s ease; }
        .bar-text { position: absolute; width: 100%; text-align: center; top: 5px; font-size: 16px; font-weight: bold; text-shadow: 1px 1px 3px black; }
        
        #health-bar { background-color: #e74c3c; box-shadow: inset 0 0 10px rgba(231,76,60,0.8); } 
        #hunger-bar { background-color: #f1c40f; box-shadow: inset 0 0 10px rgba(241,196,15,0.8); } 
        #thirst-bar { background-color: #3498db; box-shadow: inset 0 0 10px rgba(52,152,219,0.8); }
        #temp-bar { background: linear-gradient(90deg, #00d2d3 0%, #2ecc71 50%, #ff9f43 100%); width: 50%; }

        /* КНОПКИ МЕНЮ */
        .menu-buttons { position: absolute; top: 20px; left: 20px; display: flex; gap: 10px; pointer-events: auto; }
        .hud-btn {
            background: var(--panel-bg); color: var(--text-main); border: 2px solid var(--neon-orange);
            padding: 10px 20px; border-radius: 8px; font-family: 'Jura', sans-serif; font-weight: bold; font-size: 16px;
            cursor: pointer; transition: 0.2s; box-shadow: 0 0 10px rgba(255, 159, 67, 0.2);
        }
        .hud-btn:hover { background: var(--neon-orange); color: #000; }

        /* ОКНА (ИНВЕНТАРЬ / КРАФТ) */
        .modal {
            position: absolute; top: 80px; left: 20px; background: var(--panel-bg);
            border: 2px solid var(--border-color); border-radius: 10px; padding: 20px;
            width: 350px; max-height: 70vh; overflow-y: auto; display: none; pointer-events: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .modal.active { display: block; }
        .modal h2 { margin-top: 0; color: var(--neon-blue); text-transform: uppercase; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }
        
        .inv-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .inv-slot { 
            background: rgba(0,0,0,0.6); border: 1px solid #555; height: 60px; border-radius: 5px; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative;
            cursor: pointer; font-size: 24px; transition: 0.2s;
        }
        .inv-slot:hover { border-color: var(--neon-orange); background: rgba(255,159,67,0.2); }
        .inv-count { position: absolute; bottom: 2px; right: 4px; font-size: 12px; font-weight: bold; }

        .recipe-item {
            background: rgba(0,0,0,0.6); border: 1px solid #555; padding: 10px; margin-bottom: 10px;
            border-radius: 5px; display: flex; justify-content: space-between; align-items: center;
        }
        .recipe-item button { background: var(--neon-blue); color: #000; border: none; padding: 5px 10px; cursor: pointer; font-weight: bold; font-family: 'Jura'; border-radius: 3px; }
        .recipe-item button:disabled { background: #555; color: #888; cursor: not-allowed; }
        .recipe-req { font-size: 12px; color: #aaa; margin-top: 5px;}

        /* УВЕДОМЛЕНИЯ */
        #world-alert { position: absolute; top: 15%; left: 50%; transform: translateX(-50%); font-size: 30px; font-weight: bold; color: var(--neon-orange); text-shadow: 0 0 10px black; pointer-events: none; opacity: 0; transition: opacity 0.5s; text-transform: uppercase; }
        #time-display { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); font-size: 24px; font-weight: bold; color: white; background: rgba(0,0,0,0.6); padding: 5px 15px; border-radius: 10px; border: 1px solid var(--border-color);}

        /* СКРОЛЛБАР */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: var(--neon-blue); border-radius: 4px; }
    </style>
</head>
<body>

    <div id="start-screen">
        <div class="customizer-box">
            <h1>Создание персонажа</h1>
            <canvas id="char-preview" width="100" height="100" style="margin: 0 auto 20px auto; border: 1px solid var(--neon-blue); border-radius: 10px; background: #000;"></canvas>
            
            <div class="setting-row">
                <label>Цвет тела:</label>
                <input type="color" id="col-body" value="#3498db" onchange="drawPreview()">
            </div>
            <div class="setting-row">
                <label>Цвет рук:</label>
                <input type="color" id="col-hands" value="#f5b041" onchange="drawPreview()">
            </div>
            <div class="setting-row">
                <label>Цвет глаз:</label>
                <input type="color" id="col-eyes" value="#ffffff" onchange="drawPreview()">
            </div>
            
            <button class="start-btn" onclick="startGame()">ВОЙТИ В МИР</button>
        </div>
    </div>

    <div id="ui-layer">
        <div id="time-display">ДЕНЬ 1 | 00:00</div>
        
        <div class="menu-buttons">
            <button class="hud-btn" onclick="toggleModal('inv-modal')">ИНВЕНТАРЬ</button>
            <button class="hud-btn" onclick="toggleModal('craft-modal')">РЕЦЕПТЫ КРАФТА</button>
        </div>

        <div id="inv-modal" class="modal">
            <h2>Инвентарь (Левый клик = Использовать)</h2>
            <div class="inv-grid" id="inventory-grid"></div>
        </div>

        <div id="craft-modal" class="modal">
            <h2>Книга рецептов</h2>
            <div style="color:#e74c3c; font-size:12px; margin-bottom:10px;" id="wb-status">Верстак не найден рядом.</div>
            <div id="recipe-list"></div>
        </div>

        <div id="minimap-container"><canvas id="minimap" width="150" height="150"></canvas></div>
        <div id="world-alert">...</div>

        <div id="status-bars">
            <div class="bar-wrapper"><div id="health-bar" class="bar"></div><div class="bar-text">ЗДОРОВЬЕ</div></div>
            <div class="bar-wrapper"><div id="hunger-bar" class="bar"></div><div class="bar-text">ГОЛОД</div></div>
            <div class="bar-wrapper"><div id="thirst-bar" class="bar"></div><div class="bar-text">ЖАЖДА</div></div>
            <div class="bar-wrapper"><div id="temp-bar" class="bar" style="position: absolute; left: 0;"></div><div class="bar-text">ТЕМП.</div></div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const mmCanvas = document.getElementById('minimap');
    const mmCtx = mmCanvas.getContext('2d');

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();

    // ГЛОБАЛЬНЫЕ НАСТРОЙКИ
    const ZOOM = 1.8; 
    let camera = { x: 0, y: 0 };
    const keys = { w: false, a: false, s: false, d: false };
    const mouse = { x: 0, y: 0, worldX: 0, worldY: 0, clicked: false };
    
    // ВРЕМЯ (10 мин день, 5 мин ночь)
    const DAY_DURATION_MS = 10 * 60 * 1000;
    const NIGHT_DURATION_MS = 5 * 60 * 1000;
    const TOTAL_CYCLE = DAY_DURATION_MS + NIGHT_DURATION_MS;
    let gameTimeMs = 0;
    let daysPassed = 1;
    let lastFrameTime = performance.now();

    // ИГРОК
    const player = {
        x: 2000, y: 2000, size: 28, baseSpeed: 1.5, speed: 1.5, // Скорость уменьшена
        health: 100, hunger: 100, thirst: 100, temp: 50,
        colors: { body: '#3498db', hands: '#f5b041', eyes: '#ffffff' },
        inventory: {}, // Формат: 'apple': 5
        equip: null, armor: null, attackTimer: 0,
        isNearWorkbench: false
    };

    // БАЗА ДАННЫХ ПРЕДМЕТОВ (Текстуры - Эмодзи)
    const ITEMS = {
        'wood': { name: 'Дерево', icon: '🪵' }, 'stone': { name: 'Камень', icon: '🪨' },
        'iron': { name: 'Железо', icon: '💿' }, 'gold': { name: 'Золото', icon: '📀' },
        'diamond': { name: 'Алмаз', icon: '💎' }, 'pelt': { name: 'Шкура', icon: '🟤' },
        'meat': { name: 'Сырое мясо', icon: '🥩', type: 'food', foodVal: 15, hpVal: -5 },
        'cooked_meat': { name: 'Жар. мясо', icon: '🍖', type: 'food', foodVal: 40, hpVal: 10 },
        'berry': { name: 'Ягоды', icon: '🫐', type: 'food', foodVal: 10, waterVal: 5 },
        'apple': { name: 'Яблоко', icon: '🍎', type: 'food', foodVal: 15 },
        'water_flask': { name: 'Фляга', icon: '🏺', type: 'food', waterVal: 40 },
        
        // Постройки
        'workbench': { name: 'Верстак', icon: '🗜️', type: 'buildable' },
        'campfire': { name: 'Костер', icon: '🔥', type: 'buildable' },
        
        // Инструменты
        'wood_pickaxe': { name: 'Дер. Кирка', icon: '⛏️' }, 'stone_pickaxe': { name: 'Кам. Кирка', icon: '⛏️' },
        'iron_sword': { name: 'Жел. Меч', icon: '🗡️' }, 'gold_sword': { name: 'Зол. Меч', icon: '🗡️' }
    };

    // БАЗА ЖИВОТНЫХ (30 видов!)
    const ANIMAL_TYPES = [
        { id: 'wolf', icon: '🐺', size: 30, speed: 1.2, hp: 50, agro: true, biome: 'forest' },
        { id: 'fox', icon: '🦊', size: 25, speed: 1.4, hp: 30, agro: false, biome: 'forest' },
        { id: 'bear', icon: '🐻', size: 45, speed: 0.9, hp: 100, agro: true, biome: 'forest' },
        { id: 'deer', icon: '🦌', size: 35, speed: 1.5, hp: 40, agro: false, biome: 'forest' },
        { id: 'rabbit', icon: '🐇', size: 18, speed: 1.6, hp: 15, agro: false, biome: 'forest' },
        { id: 'boar', icon: '🐗', size: 35, speed: 1.1, hp: 60, agro: true, biome: 'forest' },
        { id: 'snake', icon: '🐍', size: 20, speed: 1.0, hp: 20, agro: true, biome: 'desert' },
        { id: 'crocodile', icon: '🐊', size: 40, speed: 0.8, hp: 80, agro: true, biome: 'swamp' },
        { id: 'penguin', icon: '🐧', size: 22, speed: 0.7, hp: 25, agro: false, biome: 'winter' },
        { id: 'camel', icon: '🐪', size: 45, speed: 0.8, hp: 70, agro: false, biome: 'desert' },
        { id: 'scorpion', icon: '🦂', size: 20, speed: 1.2, hp: 30, agro: true, biome: 'desert' },
        { id: 'frog', icon: '🐸', size: 15, speed: 1.2, hp: 10, agro: false, biome: 'swamp' },
        { id: 'bat', icon: '🦇', size: 20, speed: 1.5, hp: 15, agro: true, biome: 'cave' },
        { id: 'spider', icon: '🕷️', size: 25, speed: 1.4, hp: 35, agro: true, biome: 'cave' },
        { id: 'golem', icon: '🗿', size: 50, speed: 0.5, hp: 200, agro: true, biome: 'cave' },
        { id: 'polar_bear', icon: '🐻‍❄️', size: 48, speed: 0.9, hp: 120, agro: true, biome: 'winter' },
        { id: 'snow_leopard', icon: '🐆', size: 35, speed: 1.6, hp: 60, agro: true, biome: 'winter' },
        { id: 'rat', icon: '🐀', size: 15, speed: 1.3, hp: 10, agro: false, biome: 'swamp' },
        { id: 'squirrel', icon: '🐿️', size: 15, speed: 1.5, hp: 10, agro: false, biome: 'forest' },
        { id: 'hedgehog', icon: '🦔', size: 18, speed: 0.6, hp: 20, agro: false, biome: 'forest' },
        { id: 'gorilla', icon: '🦍', size: 45, speed: 1.1, hp: 110, agro: true, biome: 'swamp' },
        { id: 'elephant', icon: '🐘', size: 70, speed: 0.7, hp: 300, agro: false, biome: 'desert' },
        { id: 'rhino', icon: '🦏', size: 55, speed: 1.3, hp: 150, agro: true, biome: 'desert' },
        { id: 'hippo', icon: '🦛', size: 55, speed: 0.9, hp: 160, agro: true, biome: 'swamp' },
        { id: 'tiger', icon: '🐅', size: 40, speed: 1.5, hp: 90, agro: true, biome: 'forest' },
        { id: 'leopard', icon: '🐆', size: 35, speed: 1.6, hp: 70, agro: true, biome: 'desert' },
        { id: 'zebra', icon: '🦓', size: 40, speed: 1.4, hp: 60, agro: false, biome: 'desert' },
        { id: 'giraffe', icon: '🦒', size: 60, speed: 1.0, hp: 100, agro: false, biome: 'desert' },
        { id: 'kangaroo', icon: '🦘', size: 35, speed: 1.6, hp: 50, agro: false, biome: 'desert' },
        { id: 'buffalo', icon: '🐃', size: 50, speed: 1.0, hp: 130, agro: true, biome: 'swamp' }
    ];

    // ГЕНЕРАЦИЯ 100 РЕЦЕПТОВ (Программно)
    const RECIPES = [];
    const mats = [{id:'wood', n:'Дер.', r:'wood', amt:10}, {id:'stone', n:'Кам.', r:'stone', amt:15}, {id:'iron', n:'Жел.', r:'iron', amt:5}, {id:'gold', n:'Зол.', r:'gold', amt:8}, {id:'diamond', n:'Алм.', r:'diamond', amt:3}];
    const gears = [{id:'sword', n:'Меч', w:true}, {id:'pickaxe', n:'Кирка', w:true}, {id:'axe', n:'Топор', w:true}, {id:'spear', n:'Копье', w:false}, {id:'helmet', n:'Шлем', w:true}, {id:'chest', n:'Нагрудник', w:true}, {id:'legs', n:'Поножи', w:true}, {id:'boots', n:'Ботинки', w:true}];
    
    // Генерируем 5x8 = 40 рецептов экипировки
    mats.forEach(m => {
        gears.forEach(g => {
            let req = {}; req[m.r] = m.amt;
            if(m.id !== 'wood') req['wood'] = 5; // Рукоятки
            RECIPES.push({ id: `${m.id}_${g.id}`, name: `${m.n} ${g.n}`, req: req, wb: g.w });
        });
    });
    // Добавляем постройки и базу
    RECIPES.push({ id: 'campfire', name: 'Костер', req: {wood:15, stone:5}, wb: false });
    RECIPES.push({ id: 'workbench', name: 'Верстак', req: {wood:25, stone:10}, wb: false });
    RECIPES.push({ id: 'furnace', name: 'Печь', req: {stone:30}, wb: true });
    RECIPES.push({ id: 'chest_box', name: 'Сундук', req: {wood:40}, wb: true });
    RECIPES.push({ id: 'bandage', name: 'Бинт', req: {wood:2, berry:5}, wb: false }); // заменитель волокон
    for(let i=0; i<50; i++) {
        // Добиваем до ~100 декоративными/строительными блоками (Стена дер., Стена кам. и тд)
        RECIPES.push({ id: `block_${i}`, name: `Деталь #${i}`, req: {wood: 5}, wb: true });
    }

    // МИР
    const w = { size: 4000, resources: [], animals: [], buildables: [], lakes: [], bg: null };
    const biomesList = ['winter', 'forest', 'desert', 'swamp'];
    const biomeNodes = [];
    for(let i=0; i<60; i++) biomeNodes.push({ x: Math.random() * w.size, y: Math.random() * w.size, type: biomesList[Math.floor(Math.random() * biomesList.length)] });

    function getBiome(x, y) {
        let minDist = Infinity; let closest = 'forest';
        for(let n of biomeNodes) {
            let d = (x - n.x)**2 + (y - n.y)**2;
            if(d < minDist) { minDist = d; closest = n.type; }
        }
        return closest;
    }

    // --- ОТРИСОВКА В ПРЕВЬЮ ---
    function drawPreview() {
        const c = document.getElementById('char-preview'); const cx = c.getContext('2d');
        cx.clearRect(0,0,100,100); cx.save(); cx.translate(50, 50);
        
        let bCol = document.getElementById('col-body').value;
        let hCol = document.getElementById('col-hands').value;
        let eCol = document.getElementById('col-eyes').value;

        // Тело
        cx.fillStyle = bCol; cx.beginPath(); cx.arc(0, 0, 25, 0, Math.PI*2); cx.fill(); cx.strokeStyle = '#222'; cx.lineWidth=3; cx.stroke();
        // Глаза
        cx.fillStyle = eCol; cx.beginPath(); cx.arc(-8, -10, 5, 0, Math.PI*2); cx.fill(); cx.beginPath(); cx.arc(8, -10, 5, 0, Math.PI*2); cx.fill();
        cx.fillStyle = '#000'; cx.beginPath(); cx.arc(-8, -10, 2, 0, Math.PI*2); cx.fill(); cx.beginPath(); cx.arc(8, -10, 2, 0, Math.PI*2); cx.fill();
        // Руки
        cx.fillStyle = hCol; cx.beginPath(); cx.arc(-20, 15, 10, 0, Math.PI*2); cx.fill(); cx.stroke();
        cx.beginPath(); cx.arc(20, 15, 10, 0, Math.PI*2); cx.fill(); cx.stroke();
        cx.restore();
    }
    drawPreview();

    function startGame() {
        player.colors.body = document.getElementById('col-body').value;
        player.colors.hands = document.getElementById('col-hands').value;
        player.colors.eyes = document.getElementById('col-eyes').value;
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('ui-layer').style.display = 'block';
        
        generateWorld();
        requestAnimationFrame(gameLoop);
    }

    // --- ГЕНЕРАЦИЯ МИРА ---
    function generateWorld() {
        w.bg = document.createElement('canvas'); w.bg.width = w.size; w.bg.height = w.size;
        const bgCtx = w.bg.getContext('2d', {alpha: false});
        const chunkSize = 20;

        const colors = { 'forest': '#27ae60', 'winter': '#ecf0f1', 'desert': '#f1c40f', 'swamp': '#2c3e50' };
        
        for(let x=0; x<w.size; x+=chunkSize) {
            for(let y=0; y<w.size; y+=chunkSize) {
                let b = getBiome(x+chunkSize/2, y+chunkSize/2);
                bgCtx.fillStyle = colors[b];
                bgCtx.fillRect(x, y, chunkSize, chunkSize);
                // Детали текстуры земли
                if(Math.random() < 0.1) {
                    bgCtx.fillStyle = 'rgba(0,0,0,0.1)';
                    bgCtx.fillRect(x + Math.random()*chunkSize, y + Math.random()*chunkSize, 4, 4);
                }
            }
        }

        // Озера
        for(let i=0; i<50; i++) {
            let lx = Math.random()*w.size, ly = Math.random()*w.size;
            let b = getBiome(lx, ly);
            let blobs = []; let mainSize = Math.random() * 80 + 40;
            for(let j=0; j<5; j++) blobs.push({ x: lx + (Math.random()-0.5)*mainSize, y: ly + (Math.random()-0.5)*mainSize, r: mainSize * (0.4+Math.random()*0.6) });
            w.lakes.push({ x: lx, y: ly, blobs: blobs });
            
            bgCtx.fillStyle = b === 'swamp' ? '#16a085' : '#2980b9';
            bgCtx.beginPath();
            blobs.forEach(blob => { bgCtx.moveTo(blob.x, blob.y); bgCtx.arc(blob.x, blob.y, blob.r, 0, Math.PI*2); });
            bgCtx.fill();
        }

        // Ресурсы
        for(let i=0; i<1000; i++) {
            let x = Math.random() * w.size, y = Math.random() * w.size;
            if(inWater(x,y)) continue;
            let b = getBiome(x, y);
            let r = Math.random();
            let res = null;
            
            if(b === 'forest') {
                if(r < 0.5) res = { type: 'tree', icon: '🌲', hp: 40, drop: 'wood', size: 40 };
                else if(r < 0.8) res = { type: 'rock', icon: '🪨', hp: 60, drop: 'stone', size: 30 };
                else res = { type: 'bush', icon: '🫐', hp: 20, drop: 'berry', size: 25 };
            } else if(b === 'winter') {
                if(r < 0.4) res = { type: 'rock', icon: '🪨', hp: 60, drop: 'stone', size: 30 };
                else if(r < 0.6) res = { type: 'iron_ore', icon: '💿', hp: 80, drop: 'iron', size: 30 };
                else res = { type: 'dead_tree', icon: '🥀', hp: 30, drop: 'wood', size: 35 };
            } else if(b === 'desert') {
                if(r < 0.4) res = { type: 'cactus', icon: '🌵', hp: 30, drop: 'water_flask', size: 30 }; // Кактусы дают воду
                else if(r < 0.7) res = { type: 'gold_ore', icon: '📀', hp: 80, drop: 'gold', size: 30 };
                else res = { type: 'rock', icon: '🪨', hp: 60, drop: 'stone', size: 30 };
            } else if(b === 'swamp') {
                if(r < 0.6) res = { type: 'mud_tree', icon: '🌳', hp: 50, drop: 'wood', size: 45 };
                else res = { type: 'diamond_ore', icon: '💎', hp: 150, drop: 'diamond', size: 30 };
            }
            if(res) { res.x = x; res.y = y; res.maxHp = res.hp; w.resources.push(res); }
        }

        // Животные
        for(let i=0; i<150; i++) spawnAnimal();
    }

    function inWater(tx, ty) {
        for(let l of w.lakes) {
            if(Math.abs(tx - l.x) > 200 || Math.abs(ty - l.y) > 200) continue; 
            for(let b of l.blobs) if (Math.hypot(tx-b.x, ty-b.y) < b.r * 0.9) return true;
        }
        return false;
    }

    function spawnAnimal() {
        let x, y, b;
        do { x = Math.random() * w.size; y = Math.random() * w.size; b = getBiome(x, y); } 
        while(inWater(x,y) || Math.hypot(player.x-x, player.y-y) < 600);

        let validAnimals = ANIMAL_TYPES.filter(a => a.biome === b);
        if(validAnimals.length === 0) validAnimals = ANIMAL_TYPES; // Fallback
        
        let template = validAnimals[Math.floor(Math.random() * validAnimals.length)];
        w.animals.push({
            id: template.id, icon: template.icon, x: x, y: y, size: template.size,
            speed: template.speed, baseSpeed: template.speed, hp: template.hp, maxHp: template.hp,
            agro: template.agro, vx: 0, vy: 0, timer: 0, anim: 0
        });
    }

    // --- ВВОД ---
    window.addEventListener('keydown', e => { 
        if(e.code === 'KeyW') keys.w = true; if(e.code === 'KeyA') keys.a = true;
        if(e.code === 'KeyS') keys.s = true; if(e.code === 'KeyD') keys.d = true;
    });
    window.addEventListener('keyup', e => { 
        if(e.code === 'KeyW') keys.w = false; if(e.code === 'KeyA') keys.a = false;
        if(e.code === 'KeyS') keys.s = false; if(e.code === 'KeyD') keys.d = false;
    });
    window.addEventListener('mousemove', e => { 
        mouse.x = e.clientX; mouse.y = e.clientY; 
        mouse.worldX = (mouse.x / ZOOM) + camera.x;
        mouse.worldY = (mouse.y / ZOOM) + camera.y;
    });
    window.addEventListener('mousedown', e => { 
        if(e.button === 0 && e.target === canvas) { mouse.clicked = true; handleAction(); }
    });

    // --- ИНВЕНТАРЬ И КРАФТ (Логика) ---
    function giveItem(id, count=1) {
        if(!player.inventory[id]) player.inventory[id] = 0;
        player.inventory[id] += count;
        updateUI();
    }
    
    function removeItem(id, count=1) {
        if(player.inventory[id] >= count) {
            player.inventory[id] -= count;
            if(player.inventory[id] === 0) delete player.inventory[id];
            updateUI(); return true;
        }
        return false;
    }

    function toggleModal(id) {
        const el = document.getElementById(id);
        if(el.classList.contains('active')) { el.classList.remove('active'); }
        else { 
            document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
            el.classList.add('active'); 
            if(id === 'craft-modal') renderRecipes();
        }
    }

    function updateUI() {
        // Инвентарь
        const grid = document.getElementById('inventory-grid');
        grid.innerHTML = '';
        for(let [id, count] of Object.entries(player.inventory)) {
            let itemData = ITEMS[id] || {name: id, icon: '❓'};
            let slot = document.createElement('div');
            slot.className = 'inv-slot'; slot.innerHTML = `${itemData.icon}<div class="inv-count">${count}</div>`;
            slot.title = itemData.name;
            slot.onclick = () => useItem(id);
            grid.appendChild(slot);
        }

        // Бары
        document.getElementById('health-bar').style.width = Math.max(0, player.health) + '%';
        document.getElementById('hunger-bar').style.width = Math.max(0, player.hunger) + '%';
        document.getElementById('thirst-bar').style.width = Math.max(0, player.thirst) + '%';
        let tempEl = document.getElementById('temp-bar');
        tempEl.style.width = '10px'; tempEl.style.left = Math.max(0, Math.min(100, player.temp)) + '%'; tempEl.style.background = 'white';

        renderRecipes(); // Обновляем доступность кнопок крафта
    }

    function useItem(id) {
        let item = ITEMS[id];
        if(!item) return;
        
        if(item.type === 'food') {
            if(item.foodVal) player.hunger = Math.min(100, player.hunger + item.foodVal);
            if(item.waterVal) player.thirst = Math.min(100, player.thirst + item.waterVal);
            if(item.hpVal) player.health = Math.min(100, player.health + item.hpVal);
            removeItem(id, 1);
            showMessage(`Скушано: ${item.name}`);
        } else if (item.type === 'buildable') {
            w.buildables.push({ type: id, x: player.x, y: player.y });
            removeItem(id, 1);
            showMessage(`Установлено: ${item.name}`);
        }
    }

    function renderRecipes() {
        const list = document.getElementById('recipe-list');
        if(!list.parentElement.classList.contains('active')) return;
        
        list.innerHTML = '';
        document.getElementById('wb-status').style.display = player.isNearWorkbench ? 'none' : 'block';

        RECIPES.forEach(rec => {
            let div = document.createElement('div'); div.className = 'recipe-item';
            
            let reqStr = ''; let canCraft = true;
            for(let [r_id, r_count] of Object.entries(rec.req)) {
                let name = ITEMS[r_id] ? ITEMS[r_id].name : r_id;
                let has = player.inventory[r_id] || 0;
                reqStr += `${name}: ${has}/${r_count} `;
                if(has < r_count) canCraft = false;
            }
            if(rec.wb && !player.isNearWorkbench) canCraft = false;

            div.innerHTML = `
                <div>
                    <div><strong>${rec.name}</strong> ${rec.wb ? '🔧' : ''}</div>
                    <div class="recipe-req">${reqStr}</div>
                </div>
                <button ${canCraft ? '' : 'disabled'}>Крафт</button>
            `;
            div.querySelector('button').onclick = () => {
                if(canCraft) {
                    for(let [r_id, r_count] of Object.entries(rec.req)) removeItem(r_id, r_count);
                    giveItem(rec.id, 1);
                    showMessage(`Скрафчено: ${rec.name}`);
                }
            };
            list.appendChild(div);
        });
    }

    function showMessage(msg) {
        let el = document.getElementById('world-alert');
        el.innerText = msg; el.style.opacity = 1;
        setTimeout(() => el.style.opacity = 0, 2000);
    }

    // --- ЛОГИКА ДЕЙСТВИЙ И КЛИКОВ (ДОБЫЧА И АТАКА) ---
    function handleAction() {
        if (player.attackTimer > 0) return;
        
        let reach = 90;
        let pWorldX = mouse.worldX; let pWorldY = mouse.worldY;

        // Поиск животного по клику
        for (let i = w.animals.length - 1; i >= 0; i--) {
            let a = w.animals[i];
            if (Math.hypot(player.x - a.x, player.y - a.y) < reach && Math.hypot(pWorldX - a.x, pWorldY - a.y) < a.size + 20) {
                a.hp -= 20; // Базовый урон
                a.x += (a.x - player.x) * 0.2; a.y += (a.y - player.y) * 0.2; // Отбрасывание
                
                if (a.hp <= 0) {
                    giveItem('meat', Math.floor(Math.random()*3)+1);
                    if(a.id !== 'frog' && a.id !== 'penguin') giveItem('pelt', 1);
                    w.animals.splice(i, 1);
                }
                player.attackTimer = 15; return;
            }
        }

        // Поиск ресурса по клику
        for (let i = w.resources.length - 1; i >= 0; i--) {
            let r = w.resources[i];
            if (Math.hypot(player.x - r.x, player.y - r.y) < reach && Math.hypot(pWorldX - r.x, pWorldY - r.y) < r.size + 10) {
                r.hp -= 15; // Добыча левым кликом
                if (r.hp <= 0) {
                    giveItem(r.drop, Math.floor(Math.random()*3)+1);
                    w.resources.splice(i, 1);
                }
                player.attackTimer = 15; return;
            }
        }
        player.attackTimer = 5; 
    }

    // --- ОБНОВЛЕНИЕ ЛОГИКИ ---
    function update() {
        let now = performance.now();
        let dt = now - lastFrameTime;
        lastFrameTime = now;

        // Время суток
        gameTimeMs += dt;
        if(gameTimeMs > TOTAL_CYCLE) { gameTimeMs -= TOTAL_CYCLE; daysPassed++; }
        
        let isNight = gameTimeMs > DAY_DURATION_MS;
        let clockMins = Math.floor((gameTimeMs / TOTAL_CYCLE) * 24 * 60);
        let hrs = Math.floor(clockMins / 60).toString().padStart(2, '0');
        let mins = (clockMins % 60).toString().padStart(2, '0');
        document.getElementById('time-display').innerText = `ДЕНЬ ${daysPassed} | ${hrs}:${mins}`;

        // Движение игрока
        player.speed = inWater(player.x, player.y) ? player.baseSpeed * 0.5 : player.baseSpeed;
        if (keys.w && player.y > player.size) player.y -= player.speed;
        if (keys.s && player.y < w.size - player.size) player.y += player.speed;
        if (keys.a && player.x > player.size) player.x -= player.speed;
        if (keys.d && player.x < w.size - player.size) player.x += player.speed;

        camera.x = player.x - (canvas.width / 2) / ZOOM;
        camera.y = player.y - (canvas.height / 2) / ZOOM;

        if(player.attackTimer > 0) player.attackTimer--;

        // Показатели выживания (без выносливости)
        player.hunger -= 0.002; player.thirst -= 0.004;
        
        let currentBiome = getBiome(player.x, player.y);
        let targetTemp = currentBiome === 'winter' ? 10 : (currentBiome === 'desert' ? 90 : 50);
        if(isNight) targetTemp -= 20; // Ночью холоднее
        
        player.isNearWorkbench = false;
        w.buildables.forEach(b => { 
            let dist = Math.hypot(player.x - b.x, player.y - b.y);
            if(b.type === 'campfire' && dist < 150) targetTemp = 60; 
            if(b.type === 'workbench' && dist < 100) player.isNearWorkbench = true;
        });
        
        if (player.temp < targetTemp) player.temp += 0.05; if (player.temp > targetTemp) player.temp -= 0.05;

        if (player.hunger > 70 && player.thirst > 70 && player.temp > 40 && player.temp < 60) player.health = Math.min(100, player.health + 0.01);
        if (player.hunger <= 0) { player.hunger = 0; player.health -= 0.02; }
        if (player.thirst <= 0) { player.thirst = 0; player.health -= 0.03; }
        if (player.temp < 20 || player.temp > 80) player.health -= 0.02; 

        if(player.health <= 0) {
            alert("ВЫ ПОГИБЛИ. ПЕРЕЗАГРУЗКА...");
            location.reload();
        }

        updateUI();

        // Животные ИИ
        if(w.animals.length < 100 && Math.random() < 0.01) spawnAnimal();
        w.animals.forEach(a => {
            a.timer -= dt/16; a.anim += dt/16;
            a.speed = inWater(a.x, a.y) ? a.baseSpeed * 0.4 : a.baseSpeed;
            
            let distToPlayer = Math.hypot(player.x - a.x, player.y - a.y);

            if (a.agro) {
                if (distToPlayer < 200) { 
                    let angle = Math.atan2(player.y - a.y, player.x - a.x);
                    a.vx = Math.cos(angle) * a.speed; a.vy = Math.sin(angle) * a.speed;
                    if (distToPlayer < a.size/2 + player.size/2) player.health -= 0.5; // Урон от животного
                } else if (a.timer <= 0) {
                    let angle = Math.random() * Math.PI * 2;
                    a.vx = Math.cos(angle) * (a.speed * 0.4); a.vy = Math.sin(angle) * (a.speed * 0.4);
                    a.timer = Math.random() * 100 + 100;
                }
            } else {
                if (distToPlayer < 150) { // Убегает
                    let angle = Math.atan2(a.y - player.y, a.x - player.x); 
                    a.vx = Math.cos(angle) * (a.speed * 1.3); a.vy = Math.sin(angle) * (a.speed * 1.3);
                } else if (a.timer <= 0) {
                    let angle = Math.random() * Math.PI * 2;
                    a.vx = Math.cos(angle) * (a.speed * 0.3); a.vy = Math.sin(angle) * (a.speed * 0.3);
                    a.timer = Math.random() * 150 + 50;
                }
            }

            a.x += a.vx; a.y += a.vy;
            if(a.x < 0) a.x = 0; if(a.x > w.size) a.x = w.size;
            if(a.y < 0) a.y = 0; if(a.y > w.size) a.y = w.size;
        });
    }

    // --- ОТРИСОВКА ---
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.save(); ctx.scale(ZOOM, ZOOM); ctx.translate(-camera.x, -camera.y);

        ctx.drawImage(w.bg, 0, 0); // Земля

        let renderQueue = [];
        w.resources.forEach(r => renderQueue.push({ type: 'res', obj: r, y: r.y }));
        w.animals.forEach(a => renderQueue.push({ type: 'animal', obj: a, y: a.y }));
        w.buildables.forEach(b => renderQueue.push({ type: 'buildable', obj: b, y: b.y }));
        renderQueue.push({ type: 'player', obj: player, y: player.y });
        renderQueue.sort((a, b) => a.y - b.y);

        let viewX = camera.x, viewY = camera.y, viewW = canvas.width/ZOOM, viewH = canvas.height/ZOOM;

        ctx.font = '24px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

        renderQueue.forEach(item => {
            let o = item.obj;
            if(o.x < viewX - 80 || o.x > viewX + viewW + 80 || o.y < viewY - 80 || o.y > viewY + viewH + 80) return;

            if (item.type === 'res') {
                ctx.save(); ctx.translate(o.x, o.y);
                // Тень
                ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.beginPath(); ctx.ellipse(0, o.size/3, o.size/2, o.size/4, 0, 0, Math.PI*2); ctx.fill();
                
                ctx.font = `${o.size}px Arial`; ctx.fillText(o.icon, 0, 0);
                // Полоска хп ресурса, если его бьют
                if(o.hp < o.maxHp) {
                    ctx.fillStyle = 'black'; ctx.fillRect(-15, -o.size/2 - 10, 30, 4);
                    ctx.fillStyle = '#2ecc71'; ctx.fillRect(-15, -o.size/2 - 10, 30 * (o.hp/o.maxHp), 4);
                }
                ctx.restore();
            }
            else if (item.type === 'buildable') {
                ctx.save(); ctx.translate(o.x, o.y);
                let icon = ITEMS[o.type] ? ITEMS[o.type].icon : '📦';
                ctx.font = `30px Arial`; ctx.fillText(icon, 0, 0);
                ctx.restore();
            }
            else if (item.type === 'animal') {
                ctx.save(); ctx.translate(o.x, o.y);
                if(o.vx < 0) ctx.scale(-1, 1); // Поворот
                let jump = Math.abs(Math.sin(o.anim*0.2))*3;
                ctx.font = `${o.size}px Arial`; ctx.fillText(o.icon, 0, -jump);
                
                if(o.hp < o.maxHp) {
                    ctx.scale(o.vx < 0 ? -1 : 1, 1); // Возврат скейла для хп
                    ctx.fillStyle = 'black'; ctx.fillRect(-10, -o.size/2 - 10, 20, 3);
                    ctx.fillStyle = '#e74c3c'; ctx.fillRect(-10, -o.size/2 - 10, 20 * (o.hp/o.maxHp), 3);
                }
                ctx.restore();
            } 
            else if (item.type === 'player') {
                let angle = Math.atan2((mouse.y/ZOOM + camera.y) - o.y, (mouse.x/ZOOM + camera.x) - o.x);
                
                ctx.save(); ctx.translate(o.x, o.y);
                // Тень
                ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.beginPath(); ctx.ellipse(0, 15, 12, 6, 0, 0, Math.PI*2); ctx.fill();
                
                // Тело
                ctx.rotate(angle);
                ctx.fillStyle = player.colors.body;
                ctx.beginPath(); ctx.arc(0, 0, 14, 0, Math.PI*2); ctx.fill();
                ctx.strokeStyle = '#222'; ctx.lineWidth = 2; ctx.stroke();

                // Глаза
                ctx.fillStyle = player.colors.eyes;
                ctx.beginPath(); ctx.arc(6, -6, 3, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(6, 6, 3, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#000';
                ctx.beginPath(); ctx.arc(7, -6, 1, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(7, 6, 1, 0, Math.PI*2); ctx.fill();

                // Руки
                let hitOff = player.attackTimer > 0 ? 5 : 0;
                ctx.fillStyle = player.colors.hands;
                ctx.beginPath(); ctx.arc(10 + hitOff, 12, 5, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                ctx.beginPath(); ctx.arc(10, -12, 5, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                
                ctx.restore();
                
                if(inWater(player.x, player.y)) { ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(o.x, o.y, 20, 0, Math.PI*2); ctx.stroke(); }
            }
        });

        ctx.restore();
        
        // СИСТЕМА ДНЯ И НОЧИ
        if(gameTimeMs > DAY_DURATION_MS) {
            let nightProgress = (gameTimeMs - DAY_DURATION_MS) / NIGHT_DURATION_MS;
            // Плавное затемнение и рассвет
            let alpha = Math.sin(nightProgress * Math.PI) * 0.85; 
            
            // Прорезаем свет от костров и игрока
            let gCanvas = document.createElement('canvas'); gCanvas.width = canvas.width; gCanvas.height = canvas.height;
            let gCtx = gCanvas.getContext('2d');
            gCtx.fillStyle = `rgba(10, 10, 20, ${alpha})`; gCtx.fillRect(0,0, canvas.width, canvas.height);
            gCtx.globalCompositeOperation = 'destination-out';
            
            w.buildables.forEach(b => {
                if(b.type === 'campfire') {
                    let sx = (b.x - camera.x) * ZOOM; let sy = (b.y - camera.y) * ZOOM;
                    let grd = gCtx.createRadialGradient(sx, sy, 0, sx, sy, 250*ZOOM);
                    grd.addColorStop(0, 'rgba(255,255,255,1)'); grd.addColorStop(1, 'rgba(255,255,255,0)');
                    gCtx.fillStyle = grd; gCtx.beginPath(); gCtx.arc(sx, sy, 250*ZOOM, 0, Math.PI*2); gCtx.fill();
                }
            });
            // Свет вокруг игрока
            let px = (player.x - camera.x) * ZOOM; let py = (player.y - camera.y) * ZOOM;
            let pGrd = gCtx.createRadialGradient(px, py, 0, px, py, 150*ZOOM);
            pGrd.addColorStop(0, 'rgba(255,255,255,0.5)'); pGrd.addColorStop(1, 'rgba(255,255,255,0)');
            gCtx.fillStyle = pGrd; gCtx.beginPath(); gCtx.arc(px, py, 150*ZOOM, 0, Math.PI*2); gCtx.fill();
            
            ctx.drawImage(gCanvas, 0, 0);
        }

        // Температурный фильтр
        if (player.temp < 30) { ctx.fillStyle = `rgba(0, 210, 211, ${0.3 - player.temp/100})`; ctx.fillRect(0,0, canvas.width, canvas.height); } 
        else if (player.temp > 70) { ctx.fillStyle = `rgba(255, 159, 67, ${(player.temp-70)/100})`; ctx.fillRect(0,0, canvas.width, canvas.height); }

        drawMinimap();
    }

    function drawMinimap() {
        mmCtx.clearRect(0, 0, 150, 150);
        mmCtx.fillStyle = '#2c3e50'; mmCtx.fillRect(0,0,150,150);
        
        let mmZoom = 150 / w.size;
        // Вода
        mmCtx.fillStyle = '#2980b9';
        w.lakes.forEach(l => {
            mmCtx.beginPath(); mmCtx.arc(l.x * mmZoom, l.y * mmZoom, 40 * mmZoom, 0, Math.PI*2); mmCtx.fill();
        });
        
        // Постройки
        mmCtx.fillStyle = varColor = '#ff9f43';
        w.buildables.forEach(b => {
            mmCtx.fillRect(b.x * mmZoom - 2, b.y * mmZoom - 2, 4, 4);
        });

        // Игрок
        mmCtx.fillStyle = '#00d2d3';
        mmCtx.beginPath(); mmCtx.arc(player.x * mmZoom, player.y * mmZoom, 3, 0, Math.PI*2); mmCtx.fill();
    }

    function gameLoop() { 
        if(document.getElementById('start-screen').style.display === 'none') {
            update(); draw(); 
        }
        requestAnimationFrame(gameLoop); 
    }
</script>
