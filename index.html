<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мини-Выживание: Пиксельное Обновление</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        :root {
            --orange: #ff9f43; --blue: #00d2d3; --red: #ff4757; --green: #2ecc71; --white: #fff;
            --panel-bg: #222; --gold: #f1c40f; --diamond: #00ffff;
        }
        body { 
            margin: 0; overflow: hidden; background-color: #111; 
            font-family: 'Press Start 2P', monospace; color: white; user-select: none; 
            image-rendering: pixelated;
        }
        canvas { display: block; image-rendering: pixelated; }
        
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; }
        
        .glass-panel {
            background: var(--panel-bg); border: 4px solid #fff;
            pointer-events: auto; box-shadow: 6px 6px 0px rgba(0, 0, 0, 1);
        }

        /* Инвентарь */
        #inventory { position: absolute; top: 20px; left: 20px; padding: 15px; width: 340px; max-height: 90vh; overflow-y: auto; }
        .inv-category { font-size: 10px; color: var(--orange); margin-top: 15px; border-bottom: 2px dashed #555; padding-bottom: 5px; text-transform: uppercase; }
        .inv-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 10px; }
        
        .inv-slot { 
            width: 60px; height: 60px; background: #333; 
            display: flex; align-items: center; justify-content: center; position: relative;
            border: 2px solid #666; box-shadow: inset -3px -3px 0 rgba(0,0,0,0.5);
            cursor: pointer; transition: all 0.1s ease;
        }
        .inv-slot:hover { border-color: var(--blue); transform: scale(1.05); background: #444; }
        .slot-count { position: absolute; bottom: 4px; right: 4px; font-size: 8px; color: #fff; text-shadow: 2px 2px 0 #000;}
        .item-icon { width: 40px; height: 40px; image-rendering: pixelated; filter: drop-shadow(2px 2px 0 #000); }

        /* Крафт */
        #crafting { position: absolute; top: 20px; right: 20px; padding: 15px; width: 380px; max-height: 90vh; overflow-y: auto;}
        .craft-tabs { display: flex; gap: 4px; margin-bottom: 15px; flex-wrap: wrap;}
        .tab-btn { flex: 1; padding: 10px 4px; font-size: 8px; background: #444; border: 2px solid #222; color: #ccc; cursor: pointer; transition: 0.1s; font-family: inherit; min-width: 60px; box-shadow: 2px 2px 0 #000;}
        .tab-btn.active { background: var(--blue); color: #111; border-color: #fff;}
        
        .craft-list-content { display: none; flex-direction: column; gap: 8px; }
        .craft-list-content.active { display: flex; }
        
        .craft-btn { 
            padding: 10px; background: #333; 
            border: 2px solid #555; border-left: 6px solid var(--blue); color: white; 
            cursor: pointer; text-align: left; font-family: inherit; font-size: 9px; line-height: 14px; transition: all 0.1s; display: flex; align-items: center; gap: 10px;
            box-shadow: 3px 3px 0 #000;
        }
        .craft-btn:hover { background: #444; transform: translateX(-5px); }
        .craft-btn:disabled { opacity: 0.5; border-left-color: var(--red); cursor: not-allowed; }
        .craft-icon { width: 32px; height: 32px; image-rendering: pixelated; }

        #status-bars { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; }
        .bar-container { width: 140px; height: 20px; background: #000; border: 3px solid #fff; position: relative; box-shadow: 4px 4px 0 #000; }
        .bar-fill { height: 100%; width: 100%; transition: width 0.2s steps(10); }
        .bar-text { position: absolute; width: 100%; text-align: center; top: 4px; font-size: 8px; color: #fff; text-shadow: 2px 2px 0 #000;}
        #hp-fill { background: var(--red); }
        #hg-fill { background: var(--orange); }
        #th-fill { background: var(--blue); }
        #temp-fill { background: linear-gradient(90deg, #3498db 0%, #2ecc71 50%, #e74c3c 100%); width: 50%; }

        #tooltip { position: fixed; background: #111; padding: 10px; font-size: 8px; pointer-events: none; display: none; z-index: 1000; border: 2px solid #fff; box-shadow: 4px 4px 0 #000; line-height: 14px; }
        #world-alert { position: absolute; top: 15%; left: 50%; transform: translateX(-50%); font-size: 16px; color: white; text-shadow: 4px 4px 0 #000, -2px -2px 0 var(--blue); opacity: 0; transition: opacity 0.2s steps(5); pointer-events: none;}
        #game-over { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 24px; text-align: center; display: none; background: #111; padding: 40px; border: 4px solid var(--red); box-shadow: 10px 10px 0 #000; z-index: 100;}
        #btn-interact { background: #8e44ad; width: 100%; text-align: center; margin-top: 15px; display: none; padding: 15px; cursor: pointer; border: 3px solid #fff; color: white; font-family: inherit; font-size: 10px; box-shadow: 4px 4px 0 #000;}
        #btn-interact:hover { background: #9b59b6; }

        /* Кастомизация */
        #customization-modal { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 2000; padding: 30px; text-align: center; width: 340px; display: block; }
        .custom-row { margin-bottom: 20px; text-align: left; }
        .custom-row label { font-size: 10px; color: #ccc; }
        .custom-row input[type="color"] { width: 100%; height: 40px; margin-top: 8px; border: 2px solid #fff; cursor: pointer; background: #000; }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="customization-modal" class="glass-panel">
        <h2 style="margin-top: 0; color: var(--blue); font-size: 16px; text-shadow: 2px 2px 0 #000;">СОЗДАНИЕ ПЕРСОНАЖА</h2>
        <div class="custom-row"><label>Цвет кожи:</label><input type="color" id="skin-color" value="#f1c40f"></div>
        <div class="custom-row"><label>Цвет глаз:</label><input type="color" id="eye-color" value="#2980b9"></div>
        <div class="custom-row"><label>Цвет одежды:</label><input type="color" id="shirt-color" value="#3498db"></div>
        <button class="craft-btn" onclick="startGame()" style="width: 100%; justify-content: center; font-size: 12px; margin-top: 20px; padding: 15px;">НАЧАТЬ ИГРУ</button>
    </div>

    <div id="ui-layer">
        <div id="inventory" class="glass-panel">
            <div style="text-align: center; font-size: 12px; text-shadow: 2px 2px 0 #000;">ИНВЕНТАРЬ</div>
            <div style="font-size: 8px; text-align: center; color: #aaa; margin-top: 10px;">ЛКМ на предмет для исп.</div>
            
            <div id="inv-resources" class="inv-category">Ресурсы</div><div class="inv-grid" id="grid-resources"></div>
            <div id="inv-food" class="inv-category">Еда и Медицина</div><div class="inv-grid" id="grid-food"></div>
            <div id="inv-gear" class="inv-category">Снаряжение</div><div class="inv-grid" id="grid-gear"></div>

            <div style="margin-top:20px; border-top: 2px solid #555; padding-top: 15px;">
                <div style="font-size: 9px; color: #ccc; margin-bottom: 8px;">Оружие: <span id="inv-equip" style="color:var(--blue);">Руки</span></div>
                <div style="font-size: 9px; color: #ccc;">Броня: <span id="inv-clothes" style="color:var(--orange);">Нет</span></div>
            </div>
        </div>

        <div id="crafting" class="glass-panel">
            <div style="text-align: center; font-size: 12px; text-shadow: 2px 2px 0 #000; margin-bottom: 15px;">КРАФТ</div>
            <div class="craft-tabs">
                <button class="tab-btn active" onclick="setCraftTab('tool')">ИНСТР</button>
                <button class="tab-btn" onclick="setCraftTab('armor')">БРОНЯ</button>
                <button class="tab-btn" onclick="setCraftTab('survival')">ВЫЖИВ</button>
                <button class="tab-btn" onclick="setCraftTab('build')">СТРОЙ</button>
                <button class="tab-btn" id="tab-btn-workbench" onclick="setCraftTab('workbench')" style="display:none; color: #f1c40f;">ВЕРСТАК</button>
            </div>
            
            <div id="tab-tool" class="craft-list-content active">
                <button class="craft-btn" onclick="craft('axe')"><img id="icon-craft-axe" class="craft-icon"> Топор<br>(10 Дер, 5 Кам)</button>
                <button class="craft-btn" onclick="craft('pickaxe')"><img id="icon-craft-pickaxe" class="craft-icon"> Кирка<br>(10 Дер, 10 Кам)</button>
                <button class="craft-btn" onclick="craft('spear')"><img id="icon-craft-spear" class="craft-icon"> Копье<br>(15 Дер, 2 Кам, 5 Вол)</button>
            </div>
            <div id="tab-armor" class="craft-list-content">
                <button class="craft-btn" onclick="craft('armor_1')"><img id="icon-craft-armor_1" class="craft-icon"> Кож. Броня<br>(5 Шкур)</button>
                <button class="craft-btn" onclick="craft('armor_2')"><img id="icon-craft-armor_2" class="craft-icon"> Кост. Броня<br>(10 Кост, 5 Шкур)</button>
            </div>
            <div id="tab-survival" class="craft-list-content">
                <button class="craft-btn" onclick="craft('bandage')"><img id="icon-craft-bandage" class="craft-icon"> Бинт (+30 ХП)<br>(10 Вол)</button>
                <button class="craft-btn" onclick="craft('empty_bottle')"><img id="icon-craft-empty_bottle" class="craft-icon"> Пустая бутылка<br>(5 Дер)</button>
                <button class="craft-btn" onclick="craft('torch')" style="border-left-color: var(--orange);"><img id="icon-craft-torch" class="craft-icon"> Факел<br>(5 Дер, 2 Вол)</button>
                <button class="craft-btn" onclick="craft('campfire')"><img id="icon-craft-campfire" class="craft-icon"> Костер<br>(15 Дер, 10 Кам)</button>
                <button class="craft-btn" onclick="craft('workbench')" style="border-left-color: #f1c40f;"><img id="icon-craft-workbench" class="craft-icon"> Верстак<br>(20 Дер, 10 Кам)</button>
                <button class="craft-btn" id="btn-cook" onclick="craft('cook')" style="border-left-color: var(--orange);"><img id="icon-craft-cookedMeat" class="craft-icon"> Жарить мясо<br>(У костра)</button>
            </div>
            <div id="tab-build" class="craft-list-content">
                <button class="craft-btn" onclick="craft('wall')"><img id="icon-craft-wall" class="craft-icon"> Стена<br>(10 Дер, 5 Кам)</button>
                <button class="craft-btn" onclick="craft('door')"><img id="icon-craft-door" class="craft-icon"> Дверь<br>(15 Дер)</button>
                <button class="craft-btn" onclick="craft('window')"><img id="icon-craft-window" class="craft-icon"> Окно<br>(10 Дер, 5 Кам)</button>
            </div>
            <div id="tab-workbench" class="craft-list-content">
                <div style="font-size:8px; color:#aaa; text-align:center; margin-bottom:5px;">У верстака</div>
                <button class="craft-btn" onclick="craft('sword')"><img id="icon-craft-sword" class="craft-icon"> Меч<br>(15 Дер, 15 Кам)</button>
                <button class="craft-btn" onclick="craft('bow')"><img id="icon-craft-bow" class="craft-icon"> Лук<br>(15 Дер, 10 Вол)</button>
                <button class="craft-btn" onclick="craft('arrow')"><img id="icon-craft-arrow" class="craft-icon"> 5x Стрел<br>(5 Дер, 1 Кам)</button>
                <button class="craft-btn" onclick="craft('iron_pickaxe')"><img id="icon-craft-iron_pickaxe" class="craft-icon"> Жел. Кирка<br>(10 Дер, 10 Жел)</button>
                <button class="craft-btn" onclick="craft('iron_sword')"><img id="icon-craft-iron_sword" class="craft-icon"> Жел. Меч<br>(10 Дер, 15 Жел)</button>
                <button class="craft-btn" onclick="craft('diamond_sword')" style="border-left-color: var(--diamond);"><img id="icon-craft-diamond_sword" class="craft-icon"> Алмазный Меч<br>(15 Алм, 5 Зол)</button>
                <button class="craft-btn" onclick="craft('armor_3')" style="border-left-color: var(--diamond);"><img id="icon-craft-armor_3" class="craft-icon"> Алмазная Броня<br>(20 Алм, 10 Зол)</button>
            </div>

            <button id="btn-interact" onclick="interact()">ВОЙТИ / ВЗЯТЬ ВОДУ</button>
        </div>

        <div id="status-bars">
            <div class="bar-container"><div id="hp-fill" class="bar-fill"></div><div class="bar-text">ЗДОРОВЬЕ</div></div>
            <div class="bar-container"><div id="hg-fill" class="bar-fill"></div><div class="bar-text">ГОЛОД</div></div>
            <div class="bar-container"><div id="th-fill" class="bar-fill"></div><div class="bar-text">ЖАЖДА</div></div>
            <div class="bar-container"><div id="temp-fill" class="bar-fill" style="position: absolute; left: 0;"></div><div class="bar-text">ТЕМП.</div></div>
        </div>
        <div id="world-alert"></div>
    </div>

    <div id="game-over">
        <div id="death-cause" style="margin-bottom: 30px; text-shadow: 4px 4px 0 red;">ВЫ УМЕРЛИ</div>
        <button class="craft-btn" onclick="location.reload()" style="font-size: 14px; text-align: center; width: 100%; justify-content: center; padding: 20px;">Возродиться</button>
    </div>

    <div id="tooltip"></div>

<script>
    window.addEventListener('beforeunload', function (e) {
        if(gameRunning && !isGameOver) {
            e.preventDefault();
            e.returnValue = '';
        }
    });

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const darkCanv = document.createElement('canvas');
    const dCtx = darkCanv.getContext('2d');

    // Force strict pixelated rendering
    ctx.imageSmoothingEnabled = false;
    dCtx.imageSmoothingEnabled = false;

    function resize() { 
        canvas.width = window.innerWidth; canvas.height = window.innerHeight; 
        darkCanv.width = canvas.width; darkCanv.height = canvas.height;
        ctx.imageSmoothingEnabled = false;
    }
    window.addEventListener('resize', resize); resize();

    const ZOOM = 1.6;
    let camera = { x: 0, y: 0 };
    let time = 0;
    let screenShake = 0;
    let gameRunning = false;
    let respawnQueue = [];

    const keys = { w: false, a: false, s: false, d: false, e: false };
    const mouse = { x: 0, y: 0, clicked: false, rightClicked: false };

    window.addEventListener('keydown', e => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true; if(e.key.toLowerCase() === 'e') interact(); });
    window.addEventListener('keyup', e => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false; });
    window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
    window.addEventListener('mousedown', e => { if(e.button === 0) mouse.clicked = true; if(e.button === 2) mouse.rightClicked = true; });
    window.addEventListener('contextmenu', e => e.preventDefault());

    function startGame() {
        player.skinColor = document.getElementById('skin-color').value;
        player.eyeColor = document.getElementById('eye-color').value;
        player.shirtColor = document.getElementById('shirt-color').value;
        
        document.getElementById('customization-modal').style.display = 'none';
        document.getElementById('ui-layer').style.display = 'block';
        gameRunning = true;
    }

    // Вспомогательная функция для рисования пиксельных прямоугольников с обводкой
    function drawP(xCtx, x, y, w, h, fill, stroke='#000', lw=2) {
        xCtx.fillStyle = fill; xCtx.fillRect(x, y, w, h);
        if(stroke) { xCtx.lineWidth = lw; xCtx.strokeStyle = stroke; xCtx.strokeRect(x, y, w, h); }
    }

    const iconCache = {};
    function getGeneratedIcon(key) {
        if(iconCache[key]) return iconCache[key];
        const c = document.createElement('canvas'); c.width = 64; c.height = 64; const x = c.getContext('2d');
        x.imageSmoothingEnabled = false;
        x.translate(32, 32);
        
        // Pixel Art Icon Generator
        if(key === 'wood') { drawP(x, -16, -20, 12, 40, '#8d6e63'); drawP(x, 4, -20, 12, 40, '#6d4c41'); }
        else if(key === 'stone') { drawP(x, -15, -15, 20, 20, '#95a5a6'); drawP(x, -5, -5, 20, 20, '#7f8c8d'); }
        else if(key === 'fibers') { drawP(x, -10, -20, 8, 40, '#2ecc71'); drawP(x, 2, -10, 8, 30, '#27ae60'); }
        else if(key === 'pelt') { drawP(x, -20, -15, 40, 30, '#e67e22'); drawP(x, -10, -5, 20, 10, '#d35400', ''); }
        else if(key === 'bone') { drawP(x, -20, -4, 40, 8, '#fff'); drawP(x, -24, -8, 8, 8, '#fff'); drawP(x, -24, 0, 8, 8, '#fff'); drawP(x, 16, -8, 8, 8, '#fff'); drawP(x, 16, 0, 8, 8, '#fff'); }
        else if(key === 'iron') { drawP(x, -15,-10, 30, 20, '#bdc3c7'); drawP(x, -10,-5, 20, 5, '#fff', ''); }
        else if(key === 'gold') { drawP(x, -15,-10, 30, 20, '#f1c40f'); drawP(x, -10,-5, 20, 5, '#fff', ''); }
        else if(key === 'diamond') { drawP(x, -15,-10, 30, 20, '#00ffff'); drawP(x, -10,-5, 20, 5, '#fff', ''); }
        else if(key === 'water_bottle' || key === 'empty_bottle') { drawP(x, -10,-10, 20, 25, 'rgba(255,255,255,0.7)'); if(key==='water_bottle') drawP(x, -6, 0, 12, 11, '#3498db', ''); drawP(x, -6,-16, 12, 6, '#8d6e63'); }
        else if(key === 'meat' || key === 'cookedMeat') { drawP(x, -16,-12, 32, 24, key==='meat'?'#e74c3c':'#8d6e63'); drawP(x, -6,-4, 12, 8, '#ecf0f1', ''); }
        else if(key === 'berries') { drawP(x, -12,-8, 10, 10, '#e74c3c'); drawP(x, 2,-4, 10, 10, '#e74c3c'); drawP(x, -4, 4, 10, 10, '#e74c3c'); }
        else if(key === 'axe' || key === 'iron_axe') { drawP(x, -4,-20, 8, 40, '#8d6e63'); drawP(x, 4,-16, 16, 16, key.includes('iron')?'#bdc3c7':'#7f8c8d'); }
        else if(key === 'pickaxe' || key === 'iron_pickaxe') { drawP(x, -4,-20, 8, 40, '#8d6e63'); drawP(x, -16,-20, 32, 12, key.includes('iron')?'#bdc3c7':'#7f8c8d'); }
        else if(key === 'spear') { drawP(x, -4,-20, 8, 40, '#8d6e63'); drawP(x, -6,-30, 12, 10, '#bdc3c7'); }
        else if(key.includes('sword')) { drawP(x, -4,-10, 8, 30, '#8d6e63'); drawP(x, -12,-10, 24, 6, '#333'); drawP(x, -6,-30, 12, 20, key==='diamond_sword'?'#00ffff':(key==='iron_sword'?'#ecf0f1':'#bdc3c7')); }
        else if(key === 'bow') { drawP(x, -15,-20, 10, 40, '#8d6e63'); drawP(x, -5,-20, 4, 40, '#fff', ''); }
        else if(key === 'arrow') { drawP(x, -2,-20, 4, 40, '#8d6e63'); drawP(x, -6,-25, 12, 10, '#bdc3c7'); drawP(x, -6, 15, 12, 8, '#fff'); }
        else if(key === 'torch') { drawP(x, -4,-10, 8, 30, '#8d6e63'); drawP(x, -8,-20, 16, 10, '#e67e22'); drawP(x, -4,-24, 8, 8, '#f1c40f'); }
        else if(key === 'bandage') { drawP(x, -12,-12, 24, 24, '#ecf0f1'); drawP(x, -4,-8, 8, 16, '#e74c3c', ''); drawP(x, -8,-4, 16, 8, '#e74c3c', ''); }
        else if(key.includes('armor')) { drawP(x, -16,-10, 32, 20, key==='armor_1'?'#d35400':(key==='armor_2'?'#bdc3c7':'#00ffff')); drawP(x, -10, 10, 20, 10, key==='armor_1'?'#d35400':(key==='armor_2'?'#bdc3c7':'#00ffff')); }
        else if(key === 'workbench') { drawP(x, -20,-10, 40, 10, '#8d6e63'); drawP(x, -16, 0, 8, 16, '#8d6e63'); drawP(x, 8, 0, 8, 16, '#8d6e63'); drawP(x, -10,-14, 10, 8, '#7f8c8d'); }
        else if(key === 'campfire') { drawP(x, -15, 5, 30, 10, '#7f8c8d'); drawP(x, -10, -5, 20, 15, '#e67e22'); drawP(x, -5, -10, 10, 10, '#f1c40f'); }
        else if(key === 'wall') { drawP(x, -15,-15, 30, 30, '#7f8c8d'); drawP(x, -15, 0, 30, 2, '#333',''); drawP(x, 0, -15, 2, 30, '#333',''); }
        else if(key === 'door') { drawP(x, -12,-18, 24, 36, '#8d6e63'); drawP(x, 4, 0, 4, 4, '#f1c40f'); }
        else if(key === 'window') { drawP(x, -15,-15, 30, 30, '#3498db'); drawP(x, -15, -2, 30, 4, '#ecf0f1',''); drawP(x, -2, -15, 4, 30, '#ecf0f1',''); }
        else { drawP(x, -10,-10, 20, 20, '#fff'); }
        
        iconCache[key] = c.toDataURL();
        return iconCache[key];
    }

    const itemData = {
        wood: { name: 'Дерево', cat: 'resources', desc: 'Материал для крафта' },
        stone: { name: 'Камень', cat: 'resources', desc: 'Твердый материал' },
        fibers: { name: 'Волокна', cat: 'resources', desc: 'Для веревок' },
        pelt: { name: 'Шкура', cat: 'resources', desc: 'Для теплой брони' },
        bone: { name: 'Кость', cat: 'resources', desc: 'Для крепкой брони' },
        iron: { name: 'Железо', cat: 'resources', desc: 'Прочный металл' },
        gold: { name: 'Золото', cat: 'resources', desc: 'Редкий металл' },
        diamond: { name: 'Алмаз', cat: 'resources', desc: 'Сверхпрочный кристалл' },
        berries: { name: 'Ягоды', cat: 'food', desc: 'Клик: +15 Еды', action: 'eat' },
        meat: { name: 'Сырое мясо', cat: 'food', desc: 'Клик: +25 Еды, -10 ХП', action: 'eat_raw' },
        cookedMeat: { name: 'Жар. мясо', cat: 'food', desc: 'Клик: +40 Еды, +20 ХП', action: 'eat_cooked' },
        empty_bottle: { name: 'Пустая бутылка', cat: 'food', desc: 'Используйте у воды' },
        water_bottle: { name: 'Бутылка воды', cat: 'food', desc: 'Клик: +40 Жажды', action: 'drink' },
        bandage: { name: 'Бинт', cat: 'food', desc: 'Клик: +30 ХП', action: 'heal' },
        axe: { name: 'Топор', cat: 'gear', desc: 'Рубит дерево' },
        pickaxe: { name: 'Кирка', cat: 'gear', desc: 'Добывает камень' },
        iron_pickaxe: { name: 'Жел. Кирка', cat: 'gear', desc: 'Быстрее добывает' },

    function inWater(tx, ty) {
        if(inCave) return false;
        for(let l of worlds.overworld.lakes) {
            if (tx < l.bounds.minX || tx > l.bounds.maxX || ty < l.bounds.minY || ty > l.bounds.maxY) continue;
            for(let c of l.circles) if(Math.abs(tx - c.x) < c.r && Math.abs(ty - c.y) < c.r) return true; // Pixelated blocky collision

    }

    function spawnWorld() {
        let lakeAttempts = 0;
        while(worlds.overworld.lakes.length < 30 && lakeAttempts < 200) {
            lakeAttempts++;
            let lx = Math.random()*(worlds.overworld.size*0.5); let ly = Math.random()*worlds.overworld.size;

            for(let ex of worlds.overworld.lakes) { if(distSq(lx, ly, ex.circles[0].x, ex.circles[0].y) < 90000) { overlap = true; break; } }
            if(overlap) continue;

            let numCircles = 3 + Math.floor(Math.random()*4);
            let circles = []; let minX = lx, maxX = lx, minY = ly, maxY = ly;
            for(let j=0; j<numCircles; j++) { 
                let cx = lx+(Math.random()-0.5)*120; let cy = ly+(Math.random()-0.5)*120; let cr = 40 + Math.random()*80;
                circles.push({ x: cx, y: cy, r: cr });
                minX = Math.min(minX, cx-cr); maxX = Math.max(maxX, cx+cr); minY = Math.min(minY, cy-cr); maxY = Math.max(maxY, cy+cr);
            }
            let lake = { circles: circles, lilypads: [], bounds: {minX, maxX, minY, maxY} };
            for(let j=0; j<5; j++) lake.lilypads.push({ x: circles[0].x+(Math.random()-0.5)*80, y: circles[0].y+(Math.random()-0.5)*80 });

                equip: 'hands', armorTier: 0, state: 'wander', timer: 0, target: null, attackTimer: 0, vx: 0, vy: 0, lookAngle: 0, health: 100
            });

        for(let i=0; i<worlds.overworld.spawnCap; i++) spawnSpecificAnimal(worlds.overworld, isDesert(Math.random()*worlds.overworld.size) ? 'scorpion' : 'rabbit');
        
        for(let l of worlds.overworld.lakes) {
            let mainCircle = l.circles[0]; let numFish = Math.floor(mainCircle.r / 30);
            for(let i=0; i<numFish; i++) {

                let fProfile = fishTypes[Math.floor(Math.random()*fishTypes.length)];
                worlds.overworld.animals.push({ type: 'fish', x: mainCircle.x + Math.cos(ang)*dist, y: mainCircle.y + Math.sin(ang)*dist, lake: l, size: fProfile.s, baseSpeed: 1.0 * fProfile.v, color: fProfile.c, hp: 15, maxHp: 15, timer: 0, state: 'wander' });
            }

                worlds.overworld.animals.push({ type: 'crab', x: mainCircle.x + Math.cos(ang)*dist, y: mainCircle.y + Math.sin(ang)*dist, lake: l, size: 16, baseSpeed: 0.8, hp: 20, maxHp: 20, timer: 0, state: 'wander' });

        worlds.cave.animals.push({type: 'boss', x: worlds.cave.size/2, y: worlds.cave.size/2, size: 120, baseSpeed: 2.2, hp: 2000, maxHp: 2000, timer:0, state:'idle'});

    function showMsg(msg) { let el = document.getElementById('world-alert'); el.innerText = msg; el.style.opacity = 1; setTimeout(() => el.style.opacity = 0, 3000); }

    function interact() {
        if(!inCave && player.inventory.empty_bottle > 0) {
            let nearWater = worlds.overworld.lakes.some(l => l.circles.some(c => distSq(player.x, player.y, c.x, c.y) < (c.r + 40)**2));
            if(nearWater) { player.inventory.empty_bottle--; player.inventory.water_bottle = (player.inventory.water_bottle||0)+1; showMsg("ВОДА НАБРАНА"); updateUI(); return; }
        }
        let reachSq = 10000;
        for (let r of w.resources) {
            if ((r.type === 'cave_entrance' || r.type === 'cave_exit') && distSq(player.x, player.y, r.x, r.y) < reachSq) {
                if(r.type === 'cave_entrance') { player.savedX = player.x; player.savedY = player.y; inCave = true; w = worlds.cave; player.x = 250; player.y = 250; showMsg("ПЕЩЕРА"); } 
                else { inCave = false; w = worlds.overworld; player.x = player.savedX || 2000; player.y = player.savedY || 2000; showMsg("ПОВЕРХНОСТЬ"); }
                updateUI(); return;
            }
        }
    }

    function handleAttack() {
        if (!gameRunning || player.attackTimer > 0) return;
        if (player.equip === 'bow' && mouse.clicked) {
            if (player.inventory.arrow > 0) {
                player.inventory.arrow--;
                let angle = Math.atan2((mouse.y/ZOOM + camera.y) - player.y, (mouse.x/ZOOM + camera.x) - player.x);
                projectiles.push({ x: player.x, y: player.y, vx: Math.cos(angle)*8, vy: Math.sin(angle)*8, life: 60, type: 'arrow' });
                player.attackTimer = 30; addShake(4); updateUI();
            } else { showMsg("НЕТ СТРЕЛ"); player.attackTimer = 15; }
            mouse.clicked = false; return;
        }

        if (!mouse.clicked) return;
        let targetX = (mouse.x / ZOOM) + camera.x; let targetY = (mouse.y / ZOOM) + camera.y;
        let reach = player.equip.includes('spear') ? 120 : 70; 
        let dmg = 10, rockDmg = 5, woodDmg = 5;
        if (player.equip === 'sword') dmg = 35; else if (player.equip === 'iron_sword') dmg = 55; else if (player.equip === 'diamond_sword') dmg = 95; else if (player.equip === 'spear') dmg = 25;
        if (player.equip === 'pickaxe') rockDmg = 40; else if (player.equip === 'iron_pickaxe') rockDmg = 75;
        if (player.equip === 'axe') woodDmg = 40; else if (player.equip === 'iron_axe') woodDmg = 75;

        let hitSomething = false;

        for(let i = w.buildables.length - 1; i >= 0; i--) {
            let b = w.buildables[i];
            if (['wall', 'door', 'window'].includes(b.type)) {
                if (distance(player.x, player.y, b.x, b.y) < reach && distance(targetX, targetY, b.x, b.y) < 40) {
                    b.hp = (b.hp||50) - (woodDmg + rockDmg)/2;
                    spawnParticles(b.x, b.y, '#95a5a6', 5); addShake(4); hitSomething = true;
                    if(b.hp <= 0) w.buildables.splice(i, 1); break;
                }
            }
        }

        if(!hitSomething) {
            for (let i = w.animals.length - 1; i >= 0; i--) {
                let a = w.animals[i];
                if (distance(player.x, player.y, a.x, a.y) < reach && distance(targetX, targetY, a.x, a.y) < a.size + 20) {
                    if (a.type === 'boss' && player.equip !== 'diamond_sword') { showMsg("НУЖЕН АЛМАЗНЫЙ МЕЧ!"); hitSomething = true; break; }
                    a.hp -= dmg; spawnText(a.x, a.y - 20, `-${dmg}`, '#ff4757'); spawnParticles(a.x, a.y, '#e74c3c', 10); addShake(5);
                    if(a.type !== 'boss' && a.type !== 'fish' && a.type !== 'crab') { a.x += (a.x - player.x) * 0.1; a.y += (a.y - player.y) * 0.1; }
                    a.state = 'chase'; a.timer = 0; hitSomething = true;
                    
                    if (a.hp <= 0) {
                        if (a.type === 'fish' || a.type === 'crab') { player.inventory.meat += 1; queueRespawn('animal', { type: a.type, lake: a.lake }, w); } 
                        else {
                            player.inventory.meat += (a.size > 25 ? 2 : 1);
                            if (['bear', 'wolf', 'rabbit', 'fox', 'camel'].includes(a.type)) { player.inventory.pelt += 1; if(Math.random()<0.5) player.inventory.bone += 1; }
                            if (a.type === 'spider') player.inventory.fibers += 2;
                            if (a.type === 'boss') showMsg("БОСС ПОВЕРЖЕН!");
                            if (a.type !== 'boss') queueRespawn('animal', { type: a.type }, w);
                        }
                        w.animals.splice(i, 1);
                    }
                    break;
                }
            }
        }

        if (!hitSomething) {
            for (let i = w.resources.length - 1; i >= 0; i--) {
                let r = w.resources[i];
                if (r.hp === Infinity) continue;
                if (distance(player.x, player.y, r.x, r.y) < reach && distance(targetX, targetY, r.x, r.y) < r.size + 15) {
                    if(r.type === 'cactus') { player.health -= 5; addShake(4); }
                    let d = (r.type.includes('rock') ? rockDmg : woodDmg); r.hp -= d; hitSomething = true;
                    let pColor = r.type.includes('rock') ? '#95a5a6' : (r.type === 'bush' ? '#2ecc71' : '#8d6e63');
                    spawnParticles(r.x, r.y, pColor, 8); addShake(r.type.includes('rock') ? 6 : 4); spawnText(r.x, r.y - 20, `-${d}`, '#fff');

                    if (r.hp <= 0) {
                        if (r.type === 'tree') player.inventory.wood += Math.floor(Math.random()*4)+2;
                        if (r.type === 'cactus') { player.inventory.wood += 1; player.inventory.water_bottle++; }
                        if (r.type === 'bush') { player.inventory.berries += 2; player.inventory.fibers += 2; }
                        if (r.type === 'rock' || r.type === 'cave_rock') { player.inventory.stone += Math.floor(Math.random()*3)+1; }
                        if (r.type === 'iron_rock') { player.inventory.stone += 2; player.inventory.iron += Math.floor(Math.random()*2)+1; }
                        if (r.type === 'gold_rock') { player.inventory.stone += 2; player.inventory.gold += Math.floor(Math.random()*2)+1; }
                        if (r.type === 'diamond_rock') { player.inventory.stone += 2; player.inventory.diamond += Math.floor(Math.random()*2)+1; }
                        queueRespawn('resource', { type: r.type, size: r.size, hp: r.maxHp }, w);
                        w.resources.splice(i, 1);
                    }
                    break;
                }
            }
        }
        player.attackTimer = hitSomething ? 25 : 10; if(hitSomething) updateUI();
    }

    function isCollidingWithBuilding(nx, ny, entityType) {
        for(let b of w.buildables) {
            if (['wall', 'window', 'door'].includes(b.type)) {
                if(entityType === 'player' && b.type === 'door') continue;
                if(Math.abs(nx - b.x) < 30 && Math.abs(ny - b.y) < 30) return true;
            }
        }
        return false;
    }

    function updateAnimals() {
        w.animals.forEach(a => {
            if (!a) return; 
            a.timer--; let distToPlayer = distance(player.x, player.y, a.x, a.y);
            let vx = 0, vy = 0; let moveAng = Math.atan2(player.y - a.y, player.x - a.x);

            if (a.type === 'boss') {
                if(distToPlayer < 400) {
                    if(a.state === 'idle' && a.timer <= 0) { a.state = Math.random() > 0.5 ? 'dash' : 'wave'; a.timer = 60; }
                    if(a.state === 'dash') {
                        vx = Math.cos(moveAng)*a.baseSpeed*3; vy = Math.sin(moveAng)*a.baseSpeed*3;
                        if(distToPlayer < a.size && time%10===0) { if(player.armorTier < 3) player.health = 0; else { player.health -= 15; addShake(15); } }
                    } else if (a.state === 'wave') {
                        if(a.timer === 40) for(let i=0; i<12; i++) projectiles.push({x:a.x, y:a.y, vx:Math.cos(i*(Math.PI/6))*4, vy:Math.sin(i*(Math.PI/6))*4, type:'boss_magic', life:120});
                    }
                    if(a.timer <= 0) { a.state = 'idle'; a.timer = 120; }
                }
            }
            else if (a.type === 'fish' || a.type === 'crab') {
                if(a.timer <= 0) { a.timer = 50 + Math.random()*100; a.ang = Math.random() * Math.PI * 2; }
                vx = Math.cos(a.ang)*a.baseSpeed; vy = Math.sin(a.ang)*a.baseSpeed;
                let nextX = a.x + vx*10, nextY = a.y + vy*10;
                if(a.type === 'fish' && a.lake && !a.lake.circles.some(c => Math.abs(nextX-c.x)<c.r && Math.abs(nextY-c.y)<c.r)) { a.ang += Math.PI; vx = -vx; vy = -vy; }
            }
            else if(a.type === 'fox' || a.type === 'scorpion') {
                if(distToPlayer < 150) { 
                    if(a.type==='fox') { let runAng = moveAng + Math.PI; vx = Math.cos(runAng)*a.baseSpeed; vy = Math.sin(runAng)*a.baseSpeed; }
                    else { vx = Math.cos(moveAng)*a.baseSpeed; vy = Math.sin(moveAng)*a.baseSpeed; if(distToPlayer < 35 && a.timer<=0) { player.health -= 5; player.temp += 5; addShake(5); a.timer=40; } }
                } else { if(a.timer <= 0) { a.ang = Math.random()*Math.PI*2; a.timer = 60; } vx = Math.cos(a.ang)*a.baseSpeed*0.4; vy = Math.sin(a.ang)*a.baseSpeed*0.4; }
            }
            else if(a.type === 'camel') { if(a.timer <= 0) { a.ang = Math.random()*Math.PI*2; a.timer = 200; } vx = Math.cos(a.ang)*a.baseSpeed; vy = Math.sin(a.ang)*a.baseSpeed; }
            else if(a.type === 'vulture') {
                if(player.health < 40 && distToPlayer < 400) { a.ang = (time*0.02) % (Math.PI*2); let tx = player.x + Math.cos(a.ang)*100; let ty = player.y + Math.sin(a.ang)*100; vx = (tx-a.x)*0.05; vy = (ty-a.y)*0.05; }
                else { if(a.timer <= 0) { a.ang = Math.random()*Math.PI*2; a.timer = 100; } vx = Math.cos(a.ang)*a.baseSpeed; vy = Math.sin(a.ang)*a.baseSpeed; }
            }
            else if(a.type === 'rabbit') {
                if(distToPlayer < 150) { a.state = 'flee'; a.timer = 20; }
                if(a.state === 'flee') { if(a.timer > 10) { let ang = Math.atan2(a.y - player.y, a.x - player.x); vx = Math.cos(ang)*a.baseSpeed; vy = Math.sin(ang)*a.baseSpeed; } } 
                else if(a.timer <= 0) { if(Math.random() < 0.5) { a.state = 'wander'; a.ang = Math.random()*Math.PI*2; a.timer = 30; } else { a.state = 'idle'; a.timer = 60; } }
                if(a.state === 'wander' && a.timer > 15) { vx = Math.cos(a.ang)*a.baseSpeed*0.5; vy = Math.sin(a.ang)*a.baseSpeed*0.5; }
            }
            else if(a.type === 'wolf' || a.type === 'bear' || a.type === 'spider') {
                let aggrDist = a.type === 'bear' ? 120 : 200;
                if(distToPlayer < aggrDist && a.state !== 'chase') { a.state = 'pause'; a.timer = a.type==='spider'?0:30; }
                if(a.state === 'pause' && a.timer <= 0) a.state = 'chase';
                if(a.state === 'chase') { 
                    if(a.type==='spider' && a.timer<=0) { a.timer=40; a.ang = moveAng + (Math.random()-0.5); }
                    if(a.type!=='spider' || a.timer>20) { vx = Math.cos(a.type==='spider'?a.ang:moveAng)*a.baseSpeed; vy = Math.sin(a.type==='spider'?a.ang:moveAng)*a.baseSpeed; }
                    if(distToPlayer < a.size/2 + player.size/2 && (a.type!=='spider'||a.timer>20)) { player.health -= (a.type==='bear'?6:(a.type==='spider'?4:3)) * (1 - player.armorTier*0.2); addShake(a.type==='bear'?8:4); if(a.type==='spider') a.timer=0; }
                    if(distToPlayer > 300) a.state = 'wander';
                }
                if(a.state === 'wander') {
                    if(a.timer <= 0) { a.ang = Math.random()*Math.PI*2; a.timer = 150; }
                    vx = Math.cos(a.ang)*a.baseSpeed*(a.type==='bear'?0.3:0.4); vy = Math.sin(a.ang)*a.baseSpeed*(a.type==='bear'?0.3:0.4);
                }
            } else if(a.type === 'bat') {
                if(a.timer <= 0) { a.timer = 20; a.ang = distToPlayer < 300 ? Math.atan2(player.y - a.y, player.x - a.x) + (Math.random()-0.5)*2 : Math.random()*Math.PI*2; }
                vx = Math.cos(a.ang)*a.baseSpeed; vy = Math.sin(a.ang)*a.baseSpeed; if(distToPlayer < a.size/2 + player.size/2) { player.health -= 1; addShake(2); }
            }

            if(!['fish','crab','bat','vulture'].includes(a.type)) {
                if(isCollidingWithBuilding(a.x + vx, a.y, 'animal')) vx = 0;
                if(isCollidingWithBuilding(a.x, a.y + vy, 'animal')) vy = 0;
            }

            a.vx = vx; a.vy = vy; a.x += vx; a.y += vy;
            if(a.x < 0) a.x = 0; if(a.x > w.size) a.x = w.size; if(a.y < 0) a.y = 0; if(a.y > w.size) a.y = w.size;
        });
    }

    function updateBots() {
        if(!worlds.overworld.bots) return;
        worlds.overworld.bots.forEach(b => {
            let distToTarget = b.target ? distance(b.x, b.y, b.target.x, b.target.y) : 9999;
            if (b.state === 'wander') {
                if (Math.random() < 0.02) {
                    let res = worlds.overworld.resources[Math.floor(Math.random() * worlds.overworld.resources.length)];
                    if (res && res.hp !== Infinity && res.type !== 'cactus') { b.target = res; b.state = 'moveto'; }
                } else {
                    if (b.timer <= 0) { b.lookAngle = Math.random() * Math.PI * 2; b.timer = 100 + Math.random()*100; }
                    b.vx = Math.cos(b.lookAngle) * b.speed * 0.5; b.vy = Math.sin(b.lookAngle) * b.speed * 0.5; b.timer--;
                }
            } else if (b.state === 'moveto') {
                if (!b.target || !worlds.overworld.resources.includes(b.target)) { b.state = 'wander'; b.target = null; } 
                else if (distToTarget < 60) { b.state = 'mine'; b.timer = 80; b.equip = b.target.type.includes('rock') ? 'pickaxe' : 'axe'; } 
                else { b.lookAngle = Math.atan2(b.target.y - b.y, b.target.x - b.x); b.vx = Math.cos(b.lookAngle) * b.speed; b.vy = Math.sin(b.lookAngle) * b.speed; }
            } else if (b.state === 'mine') {
                if (!b.target || !worlds.overworld.resources.includes(b.target)) { b.state = 'wander'; b.target = null; b.equip = 'hands'; } 
                else {
                    b.lookAngle = Math.atan2(b.target.y - b.y, b.target.x - b.x); b.vx = 0; b.vy = 0; b.attackTimer = (b.timer % 20 > 10) ? 20 : 0; b.timer--;
                    if (b.timer <= 0) {
                        spawnParticles(b.target.x, b.target.y, b.target.type.includes('rock') ? '#95a5a6' : '#8d6e63', 10);
                        let idx = worlds.overworld.resources.indexOf(b.target);
                        if(idx !== -1) { queueRespawn('resource', { type: b.target.type, size: b.target.size, hp: b.target.maxHp }, worlds.overworld); worlds.overworld.resources.splice(idx, 1); }
                        b.target = null; b.woodStoneLevel = (b.woodStoneLevel || 0) + 1;
                        if (b.woodStoneLevel > 3) { b.state = 'craft'; b.timer = 60; } else { b.state = 'wander'; b.equip = 'hands'; }
                    }
                }
            } else if (b.state === 'craft') {
                b.vx = 0; b.vy = 0; b.timer--;
                if (b.timer <= 0) {
                    b.woodStoneLevel = 0;
                    if (b.armorTier < 3) b.armorTier++;
                    else if (b.equip === 'hands') b.equip = 'sword';
                    else if (b.equip === 'sword') b.equip = 'iron_sword';
                    else if (b.equip === 'iron_sword') b.equip = 'diamond_sword';
                    b.state = 'wander';
                }
            }

            let nx = b.x + b.vx, ny = b.y + b.vy;
            if(!isCollidingWithBuilding(nx, b.y, 'bot')) b.x = nx;
            if(!isCollidingWithBuilding(b.x, ny, 'bot')) b.y = ny;
            b.x = Math.max(0, Math.min(worlds.overworld.size, b.x)); b.y = Math.max(0, Math.min(worlds.overworld.size, b.y));
        });
    }

    function update() {
        if (!gameRunning || isGameOver) return;
        screenShake = Math.max(0, screenShake * 0.9);

        for (let i = respawnQueue.length - 1; i >= 0; i--) {
            let rq = respawnQueue[i];
            if (time >= rq.time) {
                if (rq.type === 'animal') {
                    if (rq.objData.type === 'fish' || rq.objData.type === 'crab') {
                        let lake = rq.objData.lake;
                        if(lake && lake.circles && lake.circles.length > 0) {
                             let mainCircle = lake.circles[0]; let ang = Math.random() * Math.PI * 2; 
                             if (rq.objData.type === 'fish') {
                                 let dist = Math.random() * (mainCircle.r * 0.5); let fProfile = fishTypes[Math.floor(Math.random()*fishTypes.length)];
                                 rq.world.animals.push({ type: 'fish', x: mainCircle.x + Math.cos(ang)*dist, y: mainCircle.y + Math.sin(ang)*dist, lake: lake, size: fProfile.s, baseSpeed: 1.0 * fProfile.v, color: fProfile.c, hp: 15, maxHp: 15, timer: 0, state: 'wander' });
                             } else {
                                 let dist = mainCircle.r + 10 + Math.random()*20;
                                 rq.world.animals.push({ type: 'crab', x: mainCircle.x + Math.cos(ang)*dist, y: mainCircle.y + Math.sin(ang)*dist, lake: lake, size: 16, baseSpeed: 0.8, hp: 20, maxHp: 20, timer: 0, state: 'wander' });
                             }
                        }
                    } else spawnSpecificAnimal(rq.world, rq.objData.type);
                }
                else if (rq.type === 'resource') spawnSpecificResource(rq.world, rq.objData);
                respawnQueue.splice(i, 1);
            }
        }

        if (inWater(player.x, player.y)) player.speed = player.baseSpeed * 0.5;
        else player.speed = player.armorTier === 3 ? player.baseSpeed * 1.2 : player.baseSpeed;

        let nx = player.x, ny = player.y;
        if (keys.w && player.y > player.size/2) ny -= player.speed;
        if (keys.s && player.y < w.size - player.size/2) ny += player.speed;
        if (keys.a && player.x > player.size/2) nx -= player.speed;
        if (keys.d && player.x < w.size - player.size/2) nx += player.speed;

        if(!isCollidingWithBuilding(nx, player.y, 'player')) player.x = nx;
        if(!isCollidingWithBuilding(player.x, ny, 'player')) player.y = ny;
        player.lookAngle = Math.atan2((mouse.y/ZOOM + camera.y) - player.y, (mouse.x/ZOOM + camera.x) - player.x);

        let shakeX = (Math.random()-0.5)*screenShake; let shakeY = (Math.random()-0.5)*screenShake;
        camera.x = player.x - (canvas.width / 2) / ZOOM + shakeX; camera.y = player.y - (canvas.height / 2) / ZOOM + shakeY;

        for(let i=particles.length-1; i>=0; i--) { let p = particles[i]; p.x += p.vx; p.y += p.vy; p.life -= 0.05; if(p.life <= 0) particles.splice(i, 1); }
        for(let i=floatingTexts.length-1; i>=0; i--) { let t = floatingTexts[i]; t.y += t.vy; t.life -= 0.03; if(t.life <= 0) floatingTexts.splice(i, 1); }
        if(!inCave && isDesert(player.x) && Math.random() < 0.15) spawnParticles(camera.x + Math.random()*canvas.width/ZOOM, camera.y - 50, '#e67e22', 1, 3);

        for(let i=projectiles.length-1; i>=0; i--) {
            let p = projectiles[i]; p.x += p.vx; p.y += p.vy; p.life--; let hit = false;
            if (p.type === 'boss_magic') { if(distSq(p.x, p.y, player.x, player.y) < 225) { player.health -= 20; addShake(8); hit = true; } } 
            else { for(let a of w.animals) { if(distSq(p.x, p.y, a.x, a.y) < a.size**2) { a.hp -= 20; spawnParticles(a.x, a.y, '#e74c3c', 15); addShake(4); hit = true; break; } } }
            if(hit || p.life <= 0) projectiles.splice(i, 1);
        }

        w.decorations.forEach(d => { if(d.type === 'tumbleweed') { d.x += 1; d.y += Math.sin(time*0.05)*2; if(d.x > w.size) d.x = w.size*0.55; } });

        player.hunger -= 0.002; player.thirst -= 0.003;
        let cycleTime = time % 900000; let isNight = cycleTime > 600000 && cycleTime < 840000;
        let targetTemp = inCave ? 30 : (isNight ? 10 : (isDesert(player.x) ? 90 : 50));
        let nearFire = w.buildables.some(b => b.type === 'campfire' && distSq(player.x, player.y, b.x, b.y) < 40000);
        
        if (nearFire) targetTemp = Math.max(targetTemp, 70); 
        if (player.equip === 'torch') targetTemp += 15;
        if (player.armorTier > 0) { if (targetTemp < 50) targetTemp += 15 * player.armorTier; if (targetTemp > 60) targetTemp += 10 * player.armorTier; }

        if (player.temp < targetTemp) player.temp += 0.05; if (player.temp > targetTemp) player.temp -= 0.05;
        player.temp = Math.max(0, Math.min(100, player.temp));

        if (player.hunger > 70 && player.thirst > 70 && player.temp > 40 && player.temp < 60) player.health = Math.min(100, player.health + 0.02);
        if (player.hunger <= 0) { player.hunger = 0; player.health -= 0.03; }
        if (player.thirst <= 0) { player.thirst = 0; player.health -= 0.05; }
        if (player.temp >= 100 || player.temp <= 0) { player.health -= 0.016; if(time%60===0) addShake(2); } else if (player.temp < 20 || player.temp > 85) player.health -= 0.004; 

        if (player.attackTimer > 0) player.attackTimer--;
        handleAttack(); mouse.clicked = false; updateAnimals(); if(!inCave) updateBots();

        if (player.health <= 0 && !isGameOver) {
            isGameOver = true; document.getElementById('game-over').style.display = 'flex'; document.getElementById('game-over').style.flexDirection = 'column';
            let cause = "ВЫ ПОГИБЛИ";
            if (player.hunger <= 0) cause = "УМЕР ОТ ГОЛОДА"; else if (player.thirst <= 0) cause = "УМЕР ОТ ЖАЖДЫ"; else if (player.temp <= 0) cause = "ЗАМЕРЗ НАСМЕРТЬ"; else if (player.temp >= 100) cause = "СГОРЕЛ ОТ ПЕРЕГРЕВА";
            document.getElementById('death-cause').innerText = cause;
        }

        let nearPortal = w.resources.some(r => (r.type === 'cave_entrance' || r.type === 'cave_exit') && distSq(player.x, player.y, r.x, r.y) < 10000);
        let btn = document.getElementById('btn-interact');
        
        if(nearPortal || (inWater(player.x, player.y) && player.inventory.empty_bottle > 0)) { 
            btn.style.display = 'block'; 
            if (nearPortal) btn.innerText = inCave ? 'ВЫЙТИ ИЗ ПЕЩЕРЫ (E)' : 'ВОЙТИ В ПЕЩЕРУ (E)';
            else btn.innerText = 'ВЗЯТЬ ВОДУ (E)';
        } else { btn.style.display = 'none'; }

        let nearWorkbench = w.buildables.some(b => b.type === 'workbench' && distSq(player.x, player.y, b.x, b.y) < 10000);
        document.getElementById('tab-btn-workbench').style.display = nearWorkbench ? 'block' : 'none';
        if(!nearWorkbench && document.getElementById('tab-workbench').classList.contains('active')) setCraftTab('tool');
    }

    function drawDecorations(ctx, item) {
        ctx.save(); ctx.translate(item.x, item.y);
        let sway = Math.floor(Math.sin(time * 0.005 + (item.offset||0)) * 2);
        
        if(item.type === 'grass') { drawP(ctx, sway, -10, 4, 10, '#27ae60', null); drawP(ctx, sway+4, -8, 4, 8, '#2ecc71', null); drawP(ctx, sway-4, -6, 4, 6, '#27ae60', null); } 
        else if(item.type === 'flower') { drawP(ctx, sway, -12, 4, 12, '#2ecc71'); drawP(ctx, sway-2, -16, 8, 8, '#f1c40f'); } 
        else if(item.type === 'tumbleweed') { let bounce = Math.floor(-Math.abs(Math.sin(time*0.05))*10); drawP(ctx, -10, bounce-10, 20, 20, '#8d6e63'); } 
        else if(item.type === 'stalactite') { drawP(ctx, -10, -40, 20, 30, '#7f8c8d'); drawP(ctx, -6, -10, 12, 10, '#95a5a6'); drawP(ctx, -2, 0, 4, 10, '#bdc3c7'); }
        ctx.restore();
    }

    function drawAnimal(o) {
        ctx.save(); ctx.translate(o.x, o.y);
        let isMoving = Math.abs(o.vx) > 0.1 || Math.abs(o.vy) > 0.1;
        let walkCycle = isMoving ? time * 0.02 : 0;
        let angle = Math.atan2(o.vy, o.vx);
        let bounce = isMoving ? Math.floor(Math.abs(Math.sin(walkCycle))*4) : 0;
        
        // Shadow
        if (o.type !== 'fish' && o.type !== 'crab') { ctx.fillStyle = 'rgba(0, 0, 0, 0.4)'; ctx.fillRect(-o.size/2, o.size/3, o.size, o.size/3); }

        if(o.type === 'rabbit' && isMoving) bounce = Math.floor(Math.abs(Math.sin(walkCycle*1.5))*10);
        if(o.type !== 'fish' && o.type !== 'crab') ctx.translate(0, -bounce);

        if(o.type === 'boss') {
            drawP(ctx, -o.size/2, -o.size/2, o.size, o.size, '#2c3e50'); // Body
            drawP(ctx, -o.size/3, -o.size/1.5, o.size/1.5, o.size/3, '#1a252f'); // Head
            let lookX = Math.cos(angle)*4;
            drawP(ctx, -o.size/4 + lookX, -o.size/1.5 + 8, 12, 12, '#e74c3c'); // Eyes
            drawP(ctx, o.size/4 + lookX, -o.size/1.5 + 8, 12, 12, '#e74c3c');
            if(o.state === 'wave') drawP(ctx, -o.size/1.5, -o.size/2, 20, 40, '#f1c40f'); // Hand wave
        } else if(o.type === 'fish') {
            ctx.rotate(angle); let tail = isMoving ? Math.sin(time*0.05)*4 : 0;
            drawP(ctx, -o.size, -o.size/2 + tail, o.size/2, o.size, o.color); // Tail
            drawP(ctx, -o.size/2, -o.size/1.5, o.size, o.size*1.3, o.color); // Body
            drawP(ctx, o.size/4, -o.size/4, 4, 4, '#fff'); // Eye
        } else if(o.type === 'crab') {
            ctx.rotate(angle); let legSwing = isMoving ? Math.sin(time*0.1)*4 : 0;
            drawP(ctx, -8, -12, 4, 8+legSwing, '#c0392b'); drawP(ctx, 4, -12, 4, 8-legSwing, '#c0392b'); // Legs
            drawP(ctx, -8, 4, 4, 8-legSwing, '#c0392b'); drawP(ctx, 4, 4, 4, 8+legSwing, '#c0392b');
            drawP(ctx, -10, -8, 20, 16, '#e74c3c'); // Body
            drawP(ctx, 10, -10, 8, 8, '#c0392b'); drawP(ctx, 10, 2, 8, 8, '#c0392b'); // Claws
            drawP(ctx, 4, -4, 4, 4, '#111', ''); drawP(ctx, 4, 0, 4, 4, '#111', ''); // Eyes
        } else if(o.type === 'rabbit') {
            ctx.rotate(angle);
            drawP(ctx, -o.size/2, -o.size/3, o.size, o.size/1.5, '#ecf0f1'); // Body
            drawP(ctx, o.size/3, -o.size/2, o.size/2, o.size/2, '#fff'); // Head
            let earT = isMoving ? Math.sin(time*0.05)*4 : 0;
            drawP(ctx, o.size/3, -o.size/2 - 8 + earT, 4, 10, '#bdc3c7'); // Ears
            drawP(ctx, o.size/3 + 6, -o.size/2 - 8 - earT, 4, 10, '#bdc3c7');
            drawP(ctx, o.size/2, -o.size/3, 4, 4, '#111'); // Eye
        } else if(o.type === 'wolf' || o.type === 'fox') {
            ctx.rotate(angle); let color = o.type === 'wolf' ? '#34495e' : '#e67e22';
            let legSwing = isMoving ? Math.sin(walkCycle)*6 : 0;
            drawP(ctx, -o.size/2+4, -o.size/2+legSwing, 6, o.size, color); // Legs
            drawP(ctx, o.size/4, -o.size/2-legSwing, 6, o.size, color);
            drawP(ctx, -o.size/2, -o.size/3, o.size, o.size/1.5, color); // Body
            drawP(ctx, -o.size/1.5 - 6, -4 + (isMoving?Math.sin(time*0.05)*4:0), 10, 8, color); // Tail
            drawP(ctx, o.size/2, -o.size/3, 10, o.size/1.5, color); // Head
            drawP(ctx, o.size/2 + 10, -2, 6, 4, color); // Snout
            drawP(ctx, o.size/2 + 2, -o.size/3 - 4, 4, 6, color); drawP(ctx, o.size/2 + 8, -o.size/3 - 4, 4, 6, color); // Ears
            drawP(ctx, o.size/2 + 6, -4, 4, 4, o.type==='wolf'?'#f1c40f':'#111'); // Eye
        } else if(o.type === 'bear') {
            ctx.rotate(angle); let legSwing = isMoving ? Math.sin(walkCycle)*4 : 0;
            drawP(ctx, -o.size/2+4, -o.size/2+legSwing, 10, o.size, '#3e2723'); // Legs
            drawP(ctx, o.size/4, -o.size/2-legSwing, 10, o.size, '#3e2723');
            drawP(ctx, -o.size/2, -o.size/2.5, o.size, o.size/1.25, '#4e342e'); // Body
            drawP(ctx, o.size/2, -o.size/3, o.size/2.5, o.size/1.5, '#5d4037'); // Head
            drawP(ctx, o.size/2 + 4, -o.size/3 - 6, 6, 6, '#3e2723'); drawP(ctx, o.size/2 + 12, -o.size/3 - 6, 6, 6, '#3e2723'); // Ears
            drawP(ctx, o.size/2 + 8, -2, 4, 4, '#111'); // Eye
        } else if(o.type === 'spider') {
            ctx.rotate(angle); let legSwing = isMoving ? Math.sin(time*0.1)*6 : 0;
            for(let i=0; i<4; i++) { drawP(ctx, -8 + i*6, -16 + legSwing*(i%2?-1:1), 4, 32, '#111'); } // Legs
            drawP(ctx, -12, -10, 20, 20, '#2c3e50'); // Body
            drawP(ctx, 8, -6, 12, 12, '#1a252f'); // Head
            drawP(ctx, 12, -4, 4, 4, '#e74c3c'); drawP(ctx, 12, 2, 4, 4, '#e74c3c'); // Eyes
        } else if(o.type === 'bat') {
            drawP(ctx, -6, -8, 12, 16, '#111'); // Body
            let wing = isMoving ? Math.sin(time*0.1)*8 : 8;
            drawP(ctx, -6-wing, -10, wing, 12, '#111'); drawP(ctx, 6, -10, wing, 12, '#111'); // Wings
            drawP(ctx, -4, -4, 4, 4, '#e74c3c'); drawP(ctx, 0, -4, 4, 4, '#e74c3c'); // Eyes
        } else if(o.type === 'scorpion') {
            ctx.rotate(angle); let legSwing = isMoving ? Math.sin(time*0.1)*4 : 0;
            for(let i=0; i<3; i++) { drawP(ctx, -6 + i*6, -12 + legSwing*(i%2?-1:1), 4, 24, '#d35400'); } // Legs
            drawP(ctx, -12, -8, 20, 16, '#e67e22'); // Body
            drawP(ctx, 8, -12, 8, 8, '#d35400'); drawP(ctx, 8, 4, 8, 8, '#d35400'); // Claws
            let tailY = isMoving ? Math.sin(time*0.1)*4 : 0;
            drawP(ctx, -20, -4, 8, 8, '#d35400'); drawP(ctx, -26, -6 + tailY, 6, 6, '#c0392b'); // Tail & Sting
        } else if(o.type === 'camel') {
            ctx.rotate(angle); let legSwing = isMoving ? Math.sin(walkCycle)*6 : 0;
            drawP(ctx, -16, -20+legSwing, 6, 40, '#d35400'); drawP(ctx, 10, -20-legSwing, 6, 40, '#d35400'); // Legs
            drawP(ctx, -20, -15, 40, 30, '#e67e22'); // Body
            drawP(ctx, -10, -25, 20, 10, '#e67e22'); // Hump
            drawP(ctx, 20, -10, 12, 16, '#e67e22'); // Neck/Head
            drawP(ctx, 26, -4, 4, 4, '#111'); // Eye
        } else if(o.type === 'vulture') {
            ctx.rotate(angle); drawP(ctx, -12, -8, 24, 16, '#333'); // Body
            let wing = Math.sin(time*0.05)*12;
            drawP(ctx, -8, -10-wing, 16, wing, '#222'); drawP(ctx, -8, 10, 16, wing, '#222'); // Wings
            drawP(ctx, 12, -4, 10, 8, '#e74c3c'); // Head
        }
        ctx.restore();
    }

    function drawHumanoid(ctx, entity, isPlayer) {
        let angle = entity.lookAngle || 0;
        ctx.save(); ctx.translate(entity.x, entity.y);
        ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.fillRect(-entity.size/2, entity.size/3, entity.size, entity.size/3); // Shadow
        
        let isMoving = isPlayer ? (keys.w || keys.a || keys.s || keys.d) : (Math.abs(entity.vx) > 0.1 || Math.abs(entity.vy) > 0.1);
        let armSwing = isMoving ? Math.floor(Math.sin(time * 0.02) * 4) : 0;
        
        let armorColor = entity.armorTier === 1 ? '#d35400' : (entity.armorTier === 2 ? '#bdc3c7' : (entity.armorTier === 3 ? '#00ffff' : entity.shirtColor)); 
        
        // Body (Blocky)
        drawP(ctx, -entity.size/2, -entity.size/2, entity.size, entity.size, armorColor, entity.armorTier===3?'#fff':'#000');
        
        if(entity.armorTier > 0) { 
            let p1 = entity.armorTier === 1 ? '#e67e22' : (entity.armorTier === 2 ? '#95a5a6' : '#fff');
            ctx.save(); ctx.rotate(angle); 
            drawP(ctx, -4, -entity.size/2 - 4, 8, 8, p1); drawP(ctx, -4, entity.size/2 - 4, 8, 8, p1); // Shoulder pads
            ctx.restore();
        }

        // Head
        drawP(ctx, -entity.size/2.5, -entity.size/2.5, entity.size/1.25, entity.size/1.25, entity.skinColor);

        // Face
        ctx.save(); ctx.rotate(angle); ctx.translate(entity.size/3, 0); 
        if(entity.health < 30) {
            drawP(ctx, 0, -6, 4, 4, '#c0392b', ''); drawP(ctx, 0, 2, 4, 4, '#c0392b', ''); // Dead/hurt eyes
        } else {
            drawP(ctx, 0, -6, 6, 6, '#fff', ''); drawP(ctx, 0, 2, 6, 6, '#fff', '');
            drawP(ctx, 2, -4, 4, 4, entity.eyeColor, ''); drawP(ctx, 2, 4, 4, 4, entity.eyeColor, ''); // Pupils
        }
        ctx.restore();

        let armExt = entity.attackTimer > 15 ? 8 : 0;
        let hR_X = Math.cos(angle + 0.8) * (14 + armSwing) + Math.cos(angle)*armExt; let hR_Y = Math.sin(angle + 0.8) * (14 + armSwing) + Math.sin(angle)*armExt;
        let hL_X = Math.cos(angle - 0.8) * (14 - armSwing) + Math.cos(angle)*armExt; let hL_Y = Math.sin(angle - 0.8) * (14 - armSwing) + Math.sin(angle)*armExt;

        // Hands
        drawP(ctx, hR_X-4, hR_Y-4, 8, 8, entity.skinColor); drawP(ctx, hL_X-4, hL_Y-4, 8, 8, entity.skinColor);

        // Weapon
        if (entity.equip !== 'hands') {
            ctx.save(); ctx.translate(hR_X, hR_Y); ctx.rotate(angle);
            let wLen = entity.equip.includes('spear') ? 35 : (entity.equip.includes('sword') ? 25 : 20); 
            
            drawP(ctx, 0, -2, wLen, 4, entity.equip==='diamond_sword' ? '#00ffff' : '#8d6e63'); // Handle
            
            if (entity.equip.includes('axe')) { 
                drawP(ctx, wLen-6, -10, 12, 20, entity.equip.includes('iron') ? '#bdc3c7' : '#7f8c8d');
            } else if (entity.equip.includes('pickaxe')) { 
                drawP(ctx, wLen-6, -16, 12, 32, entity.equip.includes('iron') ? '#bdc3c7' : '#7f8c8d');
            } else if (entity.equip.includes('spear')) { 
                drawP(ctx, wLen, -4, 12, 8, '#bdc3c7'); 
            } else if (entity.equip.includes('sword')) {
                drawP(ctx, 4, -10, 6, 20, '#333'); // Crossguard
                drawP(ctx, 10, -4, 20, 8, entity.equip==='diamond_sword' ? '#00ffff' : (entity.equip==='iron_sword' ? '#ecf0f1' : '#bdc3c7')); // Blade
            } else if (entity.equip === 'bow') {
                drawP(ctx, 0, -16, 4, 32, '#8d6e63'); drawP(ctx, 4, -16, 8, 4, '#8d6e63'); drawP(ctx, 4, 12, 8, 4, '#8d6e63'); // Bow
                drawP(ctx, 12, -16, 2, 32, '#fff', ''); // String
            } else if (entity.equip === 'torch') {
                drawP(ctx, wLen, -6, 12, 12, '#e67e22'); drawP(ctx, wLen+2, -2, 8, 8, '#f1c40f');
            }
            ctx.restore();
        }
        ctx.restore();
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        if (inCave) { 
            ctx.fillStyle = '#1a1a1a'; ctx.fillRect(0,0,canvas.width, canvas.height); 
        } else {
            ctx.save(); ctx.scale(ZOOM, ZOOM); ctx.translate(-camera.x, -camera.y);
            // Blocky biome transitions
            ctx.fillStyle = '#2ecc71'; ctx.fillRect(0, 0, worlds.overworld.size*0.55, worlds.overworld.size);
            
            // Dithered transition zone
            ctx.fillStyle = '#f39c12';
            for(let x = worlds.overworld.size*0.55; x < worlds.overworld.size*0.65; x+=40) {
                for(let y = 0; y < worlds.overworld.size; y+=40) {
                    let prob = (x - worlds.overworld.size*0.55) / (worlds.overworld.size*0.1);
                    if(Math.random() < prob) ctx.fillRect(x, y, 40, 40);
                }
            }
            ctx.fillRect(worlds.overworld.size*0.65, 0, worlds.overworld.size*0.35, worlds.overworld.size); 
            ctx.restore();
        }

        ctx.save(); ctx.scale(ZOOM, ZOOM); ctx.translate(-camera.x, -camera.y);
        let viewX = camera.x, viewY = camera.y, viewW = canvas.width/ZOOM, viewH = canvas.height/ZOOM;

        if (!inCave) {
            w.lakes.forEach(l => {
                if (l.bounds.maxX < viewX || l.bounds.minX > viewX + viewW || l.bounds.maxY < viewY || l.bounds.minY > viewY + viewH) return;
                ctx.fillStyle = '#2980b9';
                // Blocky lakes
                l.circles.forEach(c => { ctx.fillRect(c.x - c.r, c.y - c.r, c.r*2, c.r*2); });
                ctx.fillStyle = '#27ae60';
                l.lilypads.forEach(lp => { ctx.fillRect(lp.x - 10, lp.y - 10, 20, 20); ctx.fillStyle='#2980b9'; ctx.fillRect(lp.x, lp.y-10, 10, 10); ctx.fillStyle='#27ae60';});
            });
        }

        let renderQueue = [];
        w.decorations.forEach(d => { if(d.type !== 'stalactite') renderQueue.push({type: 'decor', obj: d, y: d.y}); });
        w.resources.forEach(r => renderQueue.push({ type: 'res', obj: r, y: r.y }));
        w.animals.forEach(a => { if (a) renderQueue.push({ type: 'animal', obj: a, y: a.y }) });
        w.buildables.forEach(b => renderQueue.push({ type: 'buildable', obj: b, y: b.y }));
        if(!inCave && w.bots) w.bots.forEach(b => renderQueue.push({ type: 'bot', obj: b, y: b.y }));
        if(gameRunning) renderQueue.push({ type: 'player', obj: player, y: player.y });
        
        renderQueue.sort((a, b) => a.y - b.y);

        renderQueue.forEach(item => {
            let o = item.obj;
            if(!o || o.x < viewX - 120 || o.x > viewX + viewW + 120 || o.y < viewY - 120 || o.y > viewY + viewH + 120) return;

            if(item.type === 'decor') drawDecorations(ctx, o);
            else if (item.type === 'res') {
                ctx.save(); ctx.translate(o.x, o.y);
                ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.fillRect(-o.size/2, o.size/4, o.size, o.size/3); // Blocky shadow
                let shake = (o.hp < o.maxHp && o.hp > 0 && time%10 < 5) ? 2 : 0; ctx.translate(shake, 0);

                if (o.type === 'tree') {
                    drawP(ctx, -8, -o.size/2, 16, o.size, '#5d4037'); // Trunk
                    drawP(ctx, -o.size*0.8, -o.size, o.size*1.6, o.size*1.2, '#27ae60'); // Canopy main
                    drawP(ctx, -o.size, -o.size*0.8, o.size*2, o.size*0.8, '#2ecc71'); // Canopy cross
                } else if (o.type === 'cactus') {
                    drawP(ctx, -10, -o.size, 20, o.size, '#2ecc71'); // Main
                    drawP(ctx, -24, -o.size*0.7, 14, 14, '#27ae60'); // Branch L
                    drawP(ctx, 10, -o.size*0.5, 14, 14, '#27ae60'); // Branch R
                    // Spikes
                    ctx.fillStyle = '#fff'; ctx.fillRect(-12, -o.size*0.8, 4, 4); ctx.fillRect(8, -o.size*0.4, 4, 4);
                } else if (o.type === 'bush') {
                    drawP(ctx, -o.size/2, -o.size/2, o.size, o.size, '#27ae60'); 
                    if(o.hp > 0) { drawP(ctx, -o.size/4, -o.size/4, 6, 6, '#e74c3c'); drawP(ctx, o.size/4, 0, 6, 6, '#e74c3c'); }
                } else if (o.type.includes('rock')) {
                    drawP(ctx, -o.size/2, -o.size/2, o.size, o.size*0.8, '#7f8c8d');
                    drawP(ctx, -o.size/3, -o.size/3, o.size/1.5, o.size/2, '#95a5a6');
                    if(o.type === 'iron_rock') { drawP(ctx, -8,-8, 8, 8, '#bdc3c7'); drawP(ctx, 4,4, 6, 6, '#bdc3c7'); }
                    if(o.type === 'gold_rock') { drawP(ctx, -8,-8, 8, 8, '#f1c40f'); drawP(ctx, 4,4, 6, 6, '#f1c40f'); }
                    if(o.type === 'diamond_rock') { drawP(ctx, -8,-8, 8, 8, '#00ffff'); drawP(ctx, 4,4, 6, 6, '#00ffff'); }
                } else if (o.type.includes('cave_entrance') || o.type.includes('cave_exit')) {
                    drawP(ctx, -o.size/2, -o.size/2, o.size, o.size, '#333'); drawP(ctx, -o.size/3, -o.size/3, o.size/1.5, o.size/1.5, '#000');
                }
                ctx.restore();
            } else if (item.type === 'buildable') {
                ctx.save(); ctx.translate(o.x, o.y);
                ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.fillRect(-15, 5, 30, 10);
                if(o.type === 'campfire') {
                    drawP(ctx, -15, 0, 30, 10, '#7f8c8d'); // Base
                    let fScale = Math.sin(time*0.1)*2;
                    drawP(ctx, -10, -20-fScale, 20, 20+fScale, '#e67e22'); // Fire base
                    drawP(ctx, -4, -10-fScale, 8, 10+fScale, '#f1c40f'); // Fire core
                } else if(o.type === 'workbench') {
                    drawP(ctx, -20, -10, 40, 20, '#8d6e63'); drawP(ctx, -16, 10, 8, 10, '#5d4037'); drawP(ctx, 8, 10, 8, 10, '#5d4037');
                    drawP(ctx, -12, -14, 14, 8, '#bdc3c7'); // Tool top
                } else if(o.type === 'wall') {
                    drawP(ctx, -20, -20, 40, 40, '#7f8c8d'); drawP(ctx, -20, 0, 40, 4, '#2c3e50', ''); drawP(ctx, 0, -20, 4, 40, '#2c3e50', '');
                } else if(o.type === 'door') {
                    drawP(ctx, -15, -25, 30, 50, '#8d6e63', '#5d4037', 4); drawP(ctx, 6, -2, 6, 6, '#f1c40f');
                } else if(o.type === 'window') {
                    drawP(ctx, -20, -20, 40, 40, '#3498db'); drawP(ctx, -20, -4, 40, 8, '#ecf0f1', ''); drawP(ctx, -4, -20, 8, 40, '#ecf0f1', '');
                    ctx.strokeRect(-20,-20,40,40);
                }
                ctx.restore();
            } else if (item.type === 'animal') drawAnimal(o);
            else if (item.type === 'player' || item.type === 'bot') drawHumanoid(ctx, o, item.type === 'player');
        });

        // Blocky particles
        particles.forEach(p => { ctx.globalAlpha = p.life; drawP(ctx, p.x, p.y, p.size, p.size, p.color, null); ctx.globalAlpha = 1.0; });
        floatingTexts.forEach(t => { ctx.globalAlpha = t.life; ctx.fillStyle = t.color; ctx.font = '12px "Press Start 2P"'; ctx.textAlign='center'; ctx.fillText(t.text, t.x, t.y); ctx.globalAlpha = 1.0; });
        projectiles.forEach(p => { drawP(ctx, p.x, p.y, p.type==='boss_magic'?12:6, p.type==='boss_magic'?12:6, p.type==='boss_magic'?'#e74c3c':'#bdc3c7'); });

        if(inCave) { w.decorations.forEach(d => { if(d.type === 'stalactite' && d.x > viewX-50 && d.x < viewX+viewW+50 && d.y > viewY-50 && d.y < viewY+viewH+50) drawDecorations(ctx, d); }); }

        ctx.restore();

        let cycleTime = time % 900000;
        let darknessAlpha = 0; let ambientTint = '';
        
        if (cycleTime < 540000) { darknessAlpha = 0; }
        else if (cycleTime < 600000) { darknessAlpha = ((cycleTime - 540000) / 60000) * 0.95; ambientTint = `rgba(80, 20, 0, ${darknessAlpha})`; }
        else if (cycleTime < 840000) { darknessAlpha = 0.95; ambientTint = `rgba(0, 0, 15, ${darknessAlpha})`; }
        else { darknessAlpha = 0.95 - ((cycleTime - 840000) / 60000) * 0.95; ambientTint = `rgba(50, 30, 20, ${darknessAlpha})`; }
        
        if (inCave) { darknessAlpha = 0.98; ambientTint = 'rgba(0,0,0,0.98)'; }

        // Blocky lighting system
        if (darknessAlpha > 0.01) {
            dCtx.globalCompositeOperation = 'source-over'; dCtx.clearRect(0,0, darkCanv.width, darkCanv.height);
            dCtx.fillStyle = ambientTint; dCtx.fillRect(0,0, darkCanv.width, darkCanv.height); dCtx.globalCompositeOperation = 'destination-out';
            let lightRadius = player.equip === 'torch' ? 300 : (inCave ? 150 : 120);
            
            w.buildables.forEach(b => { 
                if(b.type === 'campfire' && distance(player.x, player.y, b.x, b.y) < canvas.width/ZOOM) { 
                    let scrX = (b.x-camera.x)*ZOOM; let scrY = (b.y-camera.y)*ZOOM; 
                    // Stepped lighting instead of smooth gradient for pixel art feel
                    dCtx.fillStyle = 'rgba(255,255,255,1)'; dCtx.fillRect(scrX-100, scrY-100, 200, 200);
                    dCtx.fillStyle = 'rgba(255,255,255,0.5)'; dCtx.fillRect(scrX-150, scrY-150, 300, 300);
                    dCtx.fillStyle = 'rgba(255,255,255,0.2)'; dCtx.fillRect(scrX-200, scrY-200, 400, 400);
                }
            });
            
            let pScrX = canvas.width/2; let pScrY = canvas.height/2; let lRadZ = lightRadius*ZOOM;
            dCtx.fillStyle = 'rgba(255,255,255,1)'; dCtx.fillRect(pScrX - lRadZ*0.4, pScrY - lRadZ*0.4, lRadZ*0.8, lRadZ*0.8);
            dCtx.fillStyle = 'rgba(255,255,255,0.5)'; dCtx.fillRect(pScrX - lRadZ*0.7, pScrY - lRadZ*0.7, lRadZ*1.4, lRadZ*1.4);
            dCtx.fillStyle = 'rgba(255,255,255,0.2)'; dCtx.fillRect(pScrX - lRadZ, pScrY - lRadZ, lRadZ*2, lRadZ*2);
            
            ctx.drawImage(darkCanv, 0, 0);
        }

        if (player.temp < 30) { ctx.fillStyle = `rgba(0, 200, 255, ${0.3 - player.temp/100})`; ctx.fillRect(0,0, canvas.width, canvas.height); } 
        else if (player.temp > 70) { ctx.fillStyle = `rgba(255, 100, 0, ${(player.temp-70)/100})`; ctx.fillRect(0,0, canvas.width, canvas.height); }
    }

    function setCraftTab(tabId) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.craft-list-content').forEach(c => c.classList.remove('active'));
        event.target.classList.add('active'); document.getElementById('tab-' + tabId).classList.add('active');
    }

    function showTooltip(e, key) {
        const tt = document.getElementById('tooltip'); const data = itemData[key]; if(!data) return;
        tt.style.display = 'block'; tt.style.left = e.pageX + 15 + 'px'; tt.style.top = e.pageY + 15 + 'px'; tt.innerHTML = `<strong style="color:var(--blue)">${data.name}</strong><br>${data.desc}`;
    }
    function hideTooltip() { document.getElementById('tooltip').style.display = 'none'; }

    function handleItemClick(key) {
        if(!gameRunning || isGameOver) return;
        const action = itemData[key]?.action;
        if(itemData[key].cat === 'gear' && !action) { player.equip = player.equip === key ? 'hands' : key; }
        else if (action === 'eat' && player.inventory[key] > 0 && player.hunger < 100) { player.inventory[key]--; player.hunger = Math.min(100, player.hunger + 15); } 
        else if (action === 'heal' && player.inventory[key] > 0) { player.inventory[key]--; player.health = Math.min(100, player.health + 30); }
        else if (action === 'eat_raw' && player.inventory[key] > 0) { player.inventory[key]--; player.hunger = Math.min(100, player.hunger + 25); player.health -= 10; addShake(3); } 
        else if (action === 'eat_cooked' && player.inventory[key] > 0) { player.inventory[key]--; player.hunger = Math.min(100, player.hunger + 40); player.health = Math.min(100, player.health + 20); } 
        else if (action === 'drink' && player.inventory[key] > 0) { player.inventory[key]--; player.inventory.empty_bottle++; player.thirst = Math.min(100, player.thirst + 40); player.temp -= 15; showMsg("ВЫ ВЫПИЛИ ВОДУ"); }
        else if (action === 'place_workbench' && player.inventory[key] > 0) { player.inventory[key]--; w.buildables.push({type: 'workbench', x: player.x, y: player.y + 40}); }
        else if (action === 'place_campfire' && player.inventory[key] > 0) { player.inventory[key]--; w.buildables.push({type: 'campfire', x: player.x, y: player.y + 40}); }
        else if (action === 'place_wall' && player.inventory[key] > 0) { player.inventory[key]--; w.buildables.push({type: 'wall', x: player.x, y: player.y + 50, hp: 100}); }
        else if (action === 'place_door' && player.inventory[key] > 0) { player.inventory[key]--; w.buildables.push({type: 'door', x: player.x, y: player.y + 50, hp: 80}); }
        else if (action === 'place_window' && player.inventory[key] > 0) { player.inventory[key]--; w.buildables.push({type: 'window', x: player.x, y: player.y + 50, hp: 50}); }
        hideTooltip(); updateUI();
    }

    function updateUI() {
        document.getElementById('hp-fill').style.width = Math.max(0, player.health) + '%'; document.getElementById('hg-fill').style.width = Math.max(0, player.hunger) + '%'; document.getElementById('th-fill').style.width = Math.max(0, player.thirst) + '%';
        let tempEl = document.getElementById('temp-fill'); tempEl.style.width = '10px'; tempEl.style.left = Math.max(0, Math.min(100, player.temp)) + '%';

        ['resources', 'food', 'gear'].forEach(cat => { document.getElementById('grid-' + cat).innerHTML = ''; });
        
        Object.keys(player.inventory).forEach(key => {
            if(player.inventory[key] > 0) {
                let data = itemData[key]; if(!data) return;
                const slot = document.createElement('div'); slot.className = 'inv-slot';
                if(data.action) slot.style.borderColor = 'rgba(46, 204, 113, 0.4)';
                if(player.equip === key) { slot.style.borderColor = 'var(--blue)'; slot.style.background = '#444'; }
                
                let iconSrc = getGeneratedIcon(key);
                slot.innerHTML = `<img src="${iconSrc}" class="item-icon"><span class="slot-count">${player.inventory[key]}</span>`;
                slot.onmouseenter = (e) => showTooltip(e, key); slot.onmouseleave = hideTooltip; slot.onclick = () => handleItemClick(key);
                document.getElementById('grid-' + data.cat).appendChild(slot);
            }
        });

        document.getElementById('inv-equip').innerText = itemData[player.equip]?.name || 'Руки';
        let arName = ['Нет', 'Кожаная (I)', 'Костяная (II)', 'Алмазная (III)']; document.getElementById('inv-clothes').innerText = arName[player.armorTier];
        document.getElementById('btn-cook').disabled = !(w.buildables.some(b => b.type === 'campfire' && distSq(player.x, player.y, b.x, b.y) < 3600) && player.inventory.meat > 0);
    }

    function craft(item) {
        if(!gameRunning || isGameOver) return;
        let needsWorkbench = ['sword', 'bow', 'arrow', 'iron_pickaxe', 'iron_sword', 'diamond_sword', 'armor_3'].includes(item);
        if (needsWorkbench && !w.buildables.some(b => b.type === 'workbench' && distSq(player.x, player.y, b.x, b.y) < 10000)) { showMsg("ДАЛЕКО ОТ ВЕРСТАКА!"); return; }

        let inv = player.inventory; let success = false;
        if (item === 'axe' && inv.wood >= 10 && inv.stone >= 5) { inv.wood -= 10; inv.stone -= 5; inv.axe = 1; success = true; } 
        else if (item === 'pickaxe' && inv.wood >= 10 && inv.stone >= 10) { inv.wood -= 10; inv.stone -= 10; inv.pickaxe = 1; success = true; } 
        else if (item === 'spear' && inv.wood >= 15 && inv.stone >= 2 && inv.fibers >= 5) { inv.wood -= 15; inv.stone -= 2; inv.fibers -= 5; inv.spear = 1; success = true; } 
        else if (item === 'sword' && inv.wood >= 15 && inv.stone >= 15) { inv.wood -= 15; inv.stone -= 15; inv.sword = 1; success = true; }
        else if (item === 'iron_pickaxe' && inv.wood >= 10 && inv.iron >= 10) { inv.wood -= 10; inv.iron -= 10; inv.iron_pickaxe = 1; success = true; }
        else if (item === 'iron_sword' && inv.wood >= 10 && inv.iron >= 15) { inv.wood -= 10; inv.iron -= 15; inv.iron_sword = 1; success = true; }
        else if (item === 'diamond_sword' && inv.diamond >= 15 && inv.gold >= 5) { inv.diamond -= 15; inv.gold -= 5; inv.diamond_sword = 1; success = true; }
        else if (item === 'bow' && inv.wood >= 15 && inv.fibers >= 10) { inv.wood -= 15; inv.fibers -= 10; inv.bow = 1; success = true; }
        else if (item === 'arrow' && inv.wood >= 5 && inv.stone >= 1) { inv.wood -= 5; inv.stone -= 1; inv.arrow = (inv.arrow||0) + 5; success = true; }
        else if (item === 'armor_1' && inv.pelt >= 5 && player.armorTier < 1) { inv.pelt -= 5; player.armorTier = 1; success = true; } 
        else if (item === 'armor_2' && inv.pelt >= 5 && inv.bone >= 10 && player.armorTier < 2) { inv.pelt -= 5; inv.bone -= 10; player.armorTier = 2; success = true; } 
        else if (item === 'armor_3' && inv.diamond >= 20 && inv.gold >= 10 && player.armorTier < 3) { inv.diamond -= 20; inv.gold -= 10; player.armorTier = 3; success = true; }
        else if (item === 'bandage' && inv.fibers >= 10) { inv.fibers -= 10; inv.bandage = (inv.bandage||0)+1; success = true; } 
        else if (item === 'empty_bottle' && inv.wood >= 5) { inv.wood -= 5; inv.empty_bottle = (inv.empty_bottle||0)+1; success = true; }
        else if (item === 'campfire' && inv.wood >= 15 && inv.stone >= 10) { inv.wood -= 15; inv.stone -= 10; inv.campfire = (inv.campfire||0)+1; success = true; } 
        else if (item === 'workbench' && inv.wood >= 20 && inv.stone >= 10) { inv.wood -= 20; inv.stone -= 10; inv.workbench = (inv.workbench||0)+1; success = true; } 
        else if (item === 'torch' && inv.wood >= 5 && inv.fibers >= 2) { inv.wood -= 5; inv.fibers -= 2; inv.torch = 1; success = true; }
        else if (item === 'cook' && inv.meat > 0) { inv.meat -= 1; inv.cookedMeat += 1; success = true; }
        else if (item === 'wall' && inv.wood >= 10 && inv.stone >= 5) { inv.wood -= 10; inv.stone -= 5; inv.wall = (inv.wall||0)+1; success = true; }
        else if (item === 'door' && inv.wood >= 15) { inv.wood -= 15; inv.door = (inv.door||0)+1; success = true; }
        else if (item === 'window' && inv.wood >= 10 && inv.stone >= 5) { inv.wood -= 10; inv.stone -= 5; inv.window = (inv.window||0)+1; success = true; }
        
        if(success) { spawnParticles(player.x, player.y, '#f1c40f', 20); updateUI(); }
    }

    spawnWorld(); updateUI();
    function gameLoop(t) { time = t; update(); draw(); requestAnimationFrame(gameLoop); }
    requestAnimationFrame(gameLoop);

</script>
</body>
